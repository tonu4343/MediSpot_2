<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>メッセージ | Medi Job</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#005bac"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="icon" href="assets/icon-32.png">
<link rel="stylesheet" href="styles.css">
<style>
body.chat-page{background:linear-gradient(180deg,#f4faff,#fff 52%,#f2faf8);color:var(--ink)}
.main-nav{display:flex;justify-content:center;gap:clamp(12px,2vw,28px);flex:1;color:var(--blue-dark);font-size:13px;font-weight:900;white-space:nowrap}
.main-nav a{padding:8px 0}
.chat-shell{width:min(960px,calc(100% - 40px));margin:auto;padding:34px 0 70px}
.chat-card{overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 46px rgba(0,63,125,.1)}
.chat-head{display:flex;justify-content:space-between;gap:18px;align-items:center;flex-wrap:wrap;padding:22px 24px;background:linear-gradient(105deg,#f2f9ff,#effff6);border-bottom:1px solid #d9e8f2}
.chat-head h1{margin:5px 0;color:var(--blue-dark);font-size:22px}
.chat-head p{margin:0;color:var(--muted);font-size:12px;font-weight:800}
#paymentInfo{margin-top:6px!important;color:var(--blue-dark)!important;font-weight:900!important}
.status{display:inline-flex;min-height:26px;align-items:center;padding:0 11px;color:var(--blue);background:#fff;border:1px solid #b9dbf5;border-radius:999px;font-size:11px;font-weight:900}
.status.status-selection{color:#b5670f;background:#fff6e9;border-color:#f2cf9c}
.status.status-hired{color:var(--green-dark);background:#ecfff5;border-color:#b8ebcf}
.status.status-working{color:var(--blue);background:#edf7ff;border-color:#b9dbf5}
.status.status-completed{color:#5b6270;background:#eef1f5;border-color:#ccd3dd}
.status.status-rejected{color:#b3261e;background:#fdecea;border-color:#f3b6b0}
.chat-actions{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.btn-danger-outline{color:#b3261e;background:#fff;border:1px solid #f3b6b0}
.conversation{display:grid;align-content:start;gap:13px;min-height:390px;max-height:540px;overflow:auto;padding:24px;background:#f8fbfd}
.bubble{align-self:start;max-width:min(72%,620px);padding:12px 15px;background:#fff;border:1px solid #d9e7f0;border-radius:4px 14px 14px 14px;box-shadow:0 4px 12px rgba(0,63,125,.05)}
.bubble.mine{justify-self:end;color:#fff;background:linear-gradient(135deg,var(--blue),#1683c9);border:0;border-radius:14px 4px 14px 14px}
.bubble p{margin:0;white-space:pre-wrap;overflow-wrap:anywhere;font-size:14px;line-height:1.7;font-weight:700}
.bubble time{display:block;margin-top:5px;color:var(--muted);font-size:10px}
.bubble.mine time{color:rgba(255,255,255,.78)}
.empty{margin:auto;color:var(--muted);font-size:13px;font-weight:800;text-align:center}
.composer{padding:18px 20px;border-top:1px solid #d9e8f2}
.composer textarea{width:100%;min-height:90px;padding:12px 14px;border:1px solid #c9d9e4;border-radius:9px;font:inherit;line-height:1.7;resize:vertical}
.composer textarea:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,91,172,.1)}
.composer-row{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-top:10px}
.composer-row span{color:var(--muted);font-size:11px;font-weight:700}
.composer-closed{padding:16px 20px;text-align:center;color:var(--muted);background:#f7fbff;border-top:1px solid #d9e8f2;font-size:13px;font-weight:800}
.notice{display:none;margin:0 20px 14px;padding:12px 14px;border-radius:8px;font-size:12px;font-weight:900}
.notice.show{display:block;color:#067044;background:#eafff3;border:1px solid #a8e4c2}
.notice.error{display:block;color:#9d2d24;background:#fff2f0;border:1px solid #f1bbb5}
.safety{padding:12px 20px;color:#49667d;background:#fffdf3;border-top:1px solid #efe5bc;font-size:11px;line-height:1.6;font-weight:800}
.modal-backdrop{position:fixed;inset:0;z-index:1000;background:rgba(7,31,55,.62);backdrop-filter:blur(3px)}
.method-modal,.pay-modal{position:fixed;z-index:1001;top:50%;left:50%;transform:translate(-50%,-50%);width:min(400px,calc(100% - 40px));padding:26px;background:#fff;border-radius:16px;box-shadow:0 28px 80px rgba(0,31,67,.3);text-align:center}
.method-modal h3,.pay-modal h3{margin:0 0 8px;color:var(--blue-dark);font-size:18px;font-weight:900}
.method-modal p,.pay-modal p{margin:0 0 18px;color:var(--muted);font-size:13px;line-height:1.7;font-weight:700}
.method-options{display:grid;gap:10px;margin-bottom:14px}
.method-option{display:block;width:100%;padding:14px 16px;text-align:left;color:#14324c;background:#f8fcff;border:1px solid #e1eef8;border-radius:10px;cursor:pointer;font:inherit}
.method-option:hover{border-color:var(--blue);background:#eef7ff}
.method-option strong{display:block;margin-bottom:3px;color:var(--blue-dark);font-size:14px;font-weight:900}
.method-option span{display:block;color:var(--muted);font-size:12px;font-weight:700}
.pay-modal-card-element{min-height:44px;padding:12px 14px;margin-bottom:8px;background:#fff;border:1px solid #cfdfe9;border-radius:8px;text-align:left}
.pay-modal-error{display:none;margin:0 0 14px;color:#b3261e;font-size:12.5px;font-weight:800;text-align:left}
.pay-modal-error.show{display:block}
.pay-modal .btn,.method-modal .btn{width:100%;cursor:pointer}
.pay-modal .btn-green{margin-bottom:10px}
.pay-modal .btn-outline,.method-modal .btn-outline{border:1px solid var(--blue)}
@media(max-width:680px){.site-header{flex-wrap:wrap}.main-nav{order:3;width:100%;overflow-x:auto;justify-content:flex-start}.chat-shell{width:calc(100% - 24px);padding-top:18px}.chat-head,.composer-row{align-items:flex-start;flex-direction:column}.chat-actions,.chat-actions .btn,.composer-row .btn{width:100%}.conversation{min-height:360px;padding:16px}.bubble{max-width:88%}}
</style>
</head>
<body class="chat-page">
<header class="site-header">
  <a class="brand" href="index.html"><span class="brand-mark"><span></span></span><span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span></a>
  <nav class="main-nav" id="roleNav"></nav>
  <button class="btn btn-outline" id="logoutButton" type="button">ログアウト</button>
</header>
<main class="chat-shell">
  <article class="chat-card">
    <header class="chat-head">
      <div><span class="status" id="applicationStatus">読み込み中</span><h1 id="chatTitle">メッセージ</h1><p id="participantText">応募情報を確認しています…</p><p id="paymentInfo" style="display:none;"></p></div>
      <div class="chat-actions" id="chatActions"></div>
    </header>
    <section class="conversation" id="conversation" aria-live="polite"><div class="empty">メッセージを読み込んでいます…</div></section>
    <p class="safety">安全のため、住所・個人の電話番号・パスワードなどの機密情報は送信しないでください。勤務条件はこのチャット内で確認できます。</p>
    <div class="notice" id="notice"></div>
    <form class="composer" id="messageForm"><textarea id="messageBody" maxlength="2000" required placeholder="勤務日、仕事内容、持ち物などを確認できます。"></textarea><div class="composer-row"><span>Enterで改行できます。最大2,000文字。</span><button class="btn btn-green" id="sendButton" type="submit">メッセージを送信</button></div></form>
    <div class="composer-closed" id="composerClosed" style="display:none;">このやり取りは終了しているため、新しいメッセージは送信できません。</div>
  </article>
</main>

<div class="modal-backdrop" id="modalBackdrop" hidden></div>
<div class="method-modal" id="methodModal" hidden role="dialog" aria-modal="true" aria-label="お支払い方法の選択">
  <h3>採用を確定します</h3>
  <p>成功報酬（3,300円・税込）のお支払い方法を選択してください。</p>
  <div class="method-options">
    <button type="button" class="method-option" id="methodCardButton"><strong>①カードでその場で支払う</strong><span>pay.jp経由のカード決済で今すぐお支払いいただけます。</span></button>
    <button type="button" class="method-option" id="methodInvoiceButton"><strong>②月末まとめて請求書払い</strong><span>他の採用分とまとめて月末にご請求します。</span></button>
  </div>
  <button type="button" class="btn btn-outline" id="methodModalCancel">キャンセル</button>
</div>

<div class="pay-modal" id="payModal" hidden role="dialog" aria-modal="true" aria-label="お支払い">
  <h3>お支払い（3,300円・税込）</h3>
  <p>カード情報を入力してください。</p>
  <div class="pay-modal-card-element" id="payModalCardElement"></div>
  <p class="pay-modal-error" id="payModalError"></p>
  <button type="button" class="btn btn-green" id="payModalSubmit">この内容で支払う</button>
  <button type="button" class="btn btn-outline" id="payModalCancel">キャンセル</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="account-guard.js"></script>
<script src="application-status.js"></script>
<script src="payjp-config.js"></script>
<script src="https://js.pay.jp/v2/pay.js"></script>
<script>
(function () {
  const config = window.MEDISPOT_SUPABASE || {};
  const configured = config.url && config.anonKey && !config.url.includes('YOUR_PROJECT_ID') && !config.anonKey.includes('YOUR_SUPABASE_ANON_KEY');
  const client = configured && window.supabase ? window.supabase.createClient(config.url, config.anonKey) : null;
  const local = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const previewUserId = params.get('role') === 'seeker' ? 'seeker-preview' : 'employer-preview';
  const form = document.getElementById('messageForm');
  const conversation = document.getElementById('conversation');
  const notice = document.getElementById('notice');
  let user = null;
  let application = null;
  let currentInvoice = null;
  let role = 'seeker';
  let demoMessages = [
    { id: '1', sender_id: 'seeker-preview', body: '応募いたしました。勤務日の詳細を確認したいです。', created_at: new Date().toISOString() },
    { id: '2', sender_id: 'employer-preview', body: 'ご応募ありがとうございます。金曜日9時からの勤務を予定しています。', created_at: new Date().toISOString() }
  ];

  function esc(v) { return String(v || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c])); }
  function looksSensitive(text) { return /(0\d{1,4}[-−ー－]?\d{1,4}[-−ー－]?\d{3,4})|(\d{10,11})/.test(text) || /(パスワード|password|暗証番号|マイナンバー|口座番号)/i.test(text); }
  function show(text, error) { notice.className = 'notice ' + (error ? 'error' : 'show'); notice.textContent = text; }
  function isPreview() { return local && user && String(user.id).includes('preview'); }

  // Hire confirmation and the card charge are two separate steps (status
  // flips to 'hired' first; the pay.jp charge happens after) - so the hire
  // invoice's payment_status can lag behind the application status if the
  // employer closes the card modal without finishing, or the charge fails.
  // Refetched after every status change so the UI (and the pay-again
  // button below) always reflects the real payment state, not just
  // whatever happened on the last screen.
  async function loadInvoice() {
    if (!client || isPreview() || !application || !window.MEDISPOT_STATUS.isHiredOrLater(application.status)) { currentInvoice = null; return; }
    const r = await client.from('hire_invoices').select('id,payment_status,payment_method').eq('application_id', id).maybeSingle();
    currentInvoice = r.error ? null : r.data;
  }
  async function refreshView(app, message, isError) {
    application = app;
    await loadInvoice();
    setup(app);
    if (message) show(message, Boolean(isError));
  }

  // Employer-driven status changes go through a locked-down RPC that only
  // ever touches status, instead of a raw table update (which would let
  // any column on the row be rewritten).
  async function applyEmployerStatusUpdate(fields) {
    const rpcResult = await client.rpc('employer_update_application_status', {
      p_application_id: id,
      p_status: fields.status,
      p_payment_method: fields.payment_method || null
    });
    if (rpcResult.error) return { error: rpcResult.error };
    return client.from('seeker_applications').select('*').eq('id', id).maybeSingle();
  }

  async function updateStatus(fields, confirmMsg, successMsg) {
    if (confirmMsg && !window.confirm(confirmMsg)) return;
    if (isPreview() || !client) {
      Object.assign(application, fields);
      await refreshView(application, 'プレビュー上で更新しました。', false);
      return;
    }
    const r = await applyEmployerStatusUpdate(fields);
    if (r.error || !r.data) { console.error(r.error); show('状態を更新できませんでした。', true); return; }
    await refreshView(r.data, successMsg, false);
  }
  // withdraw is seeker-only; cancel can come from either role. The seeker
  // path still updates its own row directly (user_id-filtered); the
  // employer path goes through the same restricted RPC as updateStatus().
  async function updateStatusAsParticipant(fields, confirmMsg, successMsg) {
    if (confirmMsg && !window.confirm(confirmMsg)) return;
    if (isPreview() || !client) {
      Object.assign(application, fields);
      await refreshView(application, 'プレビュー上で更新しました。', false);
      return;
    }
    if (role === 'employer') {
      const r = await applyEmployerStatusUpdate(fields);
      if (r.error || !r.data) { console.error(r.error); show('状態を更新できませんでした。', true); return; }
      await refreshView(r.data, successMsg, false);
      return;
    }
    const r = await client.from('seeker_applications').update(fields).eq('id', id).eq('user_id', user.id).select().single();
    if (r.error) { console.error(r.error); show('状態を更新できませんでした。', true); return; }
    await refreshView(r.data, successMsg, false);
  }

  function hireApplicant() { openMethodModal(); }
  async function confirmHire(paymentMethod) {
    closeMethodModal();
    if (isPreview() || !client) {
      Object.assign(application, { status: 'hired' });
      setup(application);
      show(paymentMethod === 'card' ? 'プレビュー上で採用を確定しました。カード決済はプレビューでは実行されません。' : 'プレビュー上で採用を確定しました。月末にまとめてご請求します。', false);
      return;
    }
    const r = await applyEmployerStatusUpdate({ status: 'hired', payment_method: paymentMethod });
    if (r.error || !r.data) { console.error(r.error); show('採用を確定できませんでした。', true); return; }
    await refreshView(r.data, paymentMethod === 'card' ? '採用を確定しました。続けてお支払い情報を入力してください。' : '採用を確定しました。月末にまとめてご請求します。', false);
    if (paymentMethod !== 'card') return;
    if (!currentInvoice) { show('採用を確定しました。請求情報の取得に失敗したため、下の「カードでお支払いへ進む」からやり直してください。', true); return; }
    openPayModal(currentInvoice.id);
  }
  function proposeOffer() { updateStatus({ status: 'offer_pending' }, null, '採用承諾待ちに更新しました。'); }
  function startWork() { updateStatus({ status: 'working' }, null, '勤務中に更新しました。'); }
  function markCompleted() { updateStatus({ status: 'completed' }, '完了として確定します。よろしいですか？', '完了として更新しました。'); }
  function rejectApplicant() { updateStatus({ status: 'rejected' }, 'この応募者を不採用にします。よろしいですか？', '不採用として更新しました。'); }
  function withdrawApplication() { updateStatusAsParticipant({ status: 'withdrawn' }, 'この応募を辞退します。よろしいですか？', '辞退として更新しました。'); }
  function cancelHire() { updateStatusAsParticipant({ status: 'cancelled' }, 'この採用をキャンセルします。よろしいですか？', 'キャンセルとして更新しました。'); }
  async function cancelSelectionStart() {
    if (!window.confirm('選考の開始をキャンセルします。応募したばかりの状態に戻ります。よろしいですか？')) return;
    if (isPreview() || !client) { location.href = 'employer-applications.html'; return; }
    const r = await applyEmployerStatusUpdate({ status: 'applied' });
    if (r.error || !r.data) { console.error(r.error); show('状態を更新できませんでした。', true); return; }
    location.href = 'employer-applications.html';
  }

  function actionButton(id, label, extraClass) { return '<button class="btn ' + (extraClass || 'btn-green') + '" id="' + id + '" type="button">' + label + '</button>'; }

  function downloadInvoice() {
    if (!currentInvoice || !application) return;
    const methodLabel = currentInvoice.payment_method === 'card' ? 'カード払い' : '月末請求書払い';
    const lines = [
      '請求書',
      '',
      '請求先：' + (application.facility_name || '医療機関') + ' 様',
      '発行日：' + new Date().toLocaleDateString('ja-JP'),
      '',
      '求職者：' + (application.seeker_name || '求職者'),
      '求人：' + (application.job_title || '医療求人'),
      '金額：3,300円（税込）',
      '支払い方法：' + methodLabel,
      '支払いステータス：' + (currentInvoice.payment_status || '未払い'),
      '',
      'Medical Spot Job'
    ];
    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'invoice_' + currentInvoice.id + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  function buildActions(app) {
    const status = app.status;
    const parts = [];
    if (role === 'employer') {
      if (status === 'screening') { parts.push(actionButton('offerButton', '内定を提示する')); parts.push(actionButton('cancelStartButton', '選考開始をキャンセル', 'btn-danger-outline')); }
      if (status === 'offer_pending') parts.push(actionButton('hireButton', '採用を確定する'));
      if (status === 'hired') parts.push(actionButton('startWorkButton', '勤務を開始する'));
      if (status === 'working') parts.push(actionButton('completeButton', '完了にする'));
      if (currentInvoice && currentInvoice.payment_method === 'card' && (currentInvoice.payment_status === '未払い' || currentInvoice.payment_status === '決済エラー')) parts.push(actionButton('retryPayButton', 'カードでお支払いへ進む', 'btn-outline'));
      if (currentInvoice) parts.push(actionButton('downloadInvoiceButton', '請求書をダウンロード', 'btn-outline'));
      if (window.MEDISPOT_STATUS.isPreHire(status)) parts.push(actionButton('rejectButton', '不採用にする', 'btn-danger-outline'));
      if (window.MEDISPOT_STATUS.isCancelable(status)) parts.push(actionButton('cancelButton', 'キャンセルする', 'btn-danger-outline'));
    } else {
      if (window.MEDISPOT_STATUS.isPreHire(status)) parts.push(actionButton('withdrawButton', '辞退する', 'btn-danger-outline'));
      if (window.MEDISPOT_STATUS.isCancelable(status)) parts.push(actionButton('cancelButton', 'キャンセルする', 'btn-danger-outline'));
    }
    parts.push('<a class="btn btn-outline" href="' + (role === 'employer' ? 'employer-applications.html' : 'seeker-applications.html') + '">一覧へ戻る</a>');
    return parts.join('');
  }

  function wireAction(elementId, handler) { const el = document.getElementById(elementId); if (el) el.addEventListener('click', handler); }

  function setup(app) {
    application = app;
    role = user && app.employer_id === user.id ? 'employer' : 'seeker';
    const statusEl = document.getElementById('applicationStatus');
    statusEl.textContent = window.MEDISPOT_STATUS.label(app.status);
    statusEl.className = 'status ' + window.MEDISPOT_STATUS.cssClass(app.status);
    document.getElementById('chatTitle').textContent = app.job_title || '応募メッセージ';
    document.getElementById('participantText').textContent = role === 'employer' ? (app.seeker_name || '求職者') + 'さんとのメッセージ' : (app.facility_name || '医療機関') + 'とのメッセージ';
    const paymentEl = document.getElementById('paymentInfo');
    if (role === 'employer' && currentInvoice) {
      const methodLabel = currentInvoice.payment_method === 'card' ? 'カード払い' : '月末請求書払い';
      paymentEl.textContent = '成功報酬：3,300円（' + methodLabel + '・' + (currentInvoice.payment_status || '未払い') + '）';
      paymentEl.style.display = '';
    } else {
      paymentEl.style.display = 'none';
    }
    document.getElementById('roleNav').innerHTML = role === 'employer' ? '<a href="employer-dashboard.html">ダッシュボード</a><a href="employer-applications.html">応募者管理</a>' : '<a href="seeker-dashboard.html">ダッシュボード</a><a href="seeker-applications.html">応募管理</a>';

    document.getElementById('chatActions').innerHTML = buildActions(app);
    wireAction('offerButton', proposeOffer);
    wireAction('hireButton', hireApplicant);
    wireAction('startWorkButton', startWork);
    wireAction('completeButton', markCompleted);
    wireAction('retryPayButton', function () { if (currentInvoice) openPayModal(currentInvoice.id); });
    wireAction('downloadInvoiceButton', downloadInvoice);
    wireAction('rejectButton', rejectApplicant);
    wireAction('withdrawButton', withdrawApplication);
    wireAction('cancelButton', cancelHire);
    wireAction('cancelStartButton', cancelSelectionStart);

    const chatOpen = window.MEDISPOT_STATUS.isChatOpen(app.status);
    form.style.display = chatOpen ? '' : 'none';
    document.getElementById('composerClosed').style.display = chatOpen ? 'none' : '';
  }

  function openMethodModal() {
    document.getElementById('modalBackdrop').hidden = false;
    document.getElementById('methodModal').hidden = false;
  }
  function closeMethodModal() {
    document.getElementById('methodModal').hidden = true;
    document.getElementById('modalBackdrop').hidden = true;
  }

  // Same pay.jp Elements + /api/charge flow as employer-payments.html used
  // to run from a persistent "支払う" button; now triggered once, right
  // after confirming a hire, instead of being revisitable from a list.
  const payjpConfig = window.MEDISPOT_PAYJP || {};
  const payjpReady = window.Payjp && payjpConfig.publicKey && !payjpConfig.publicKey.includes('YOUR_PAYJP_PUBLIC_KEY');
  const payjp = payjpReady ? Payjp(payjpConfig.publicKey) : null;
  let cardElement = null;
  let pendingInvoiceId = null;

  function showPayError(text) { const el = document.getElementById('payModalError'); el.textContent = text; el.classList.add('show'); }
  function hidePayError() { document.getElementById('payModalError').classList.remove('show'); }

  function openPayModal(invoiceId) {
    if (!payjp) { window.alert('お支払い機能が設定されていません。運営にお問い合わせください。'); return; }
    pendingInvoiceId = invoiceId;
    hidePayError();
    document.getElementById('modalBackdrop').hidden = false;
    document.getElementById('payModal').hidden = false;
    if (!cardElement) { cardElement = payjp.elements().create('card'); cardElement.mount('#payModalCardElement'); }
  }
  function closePayModal() {
    pendingInvoiceId = null;
    document.getElementById('payModal').hidden = true;
    document.getElementById('modalBackdrop').hidden = true;
  }

  document.getElementById('methodCardButton').addEventListener('click', function () { confirmHire('card'); });
  document.getElementById('methodInvoiceButton').addEventListener('click', function () { confirmHire('invoice'); });
  document.getElementById('methodModalCancel').addEventListener('click', closeMethodModal);
  document.getElementById('payModalCancel').addEventListener('click', closePayModal);
  document.getElementById('modalBackdrop').addEventListener('click', function () {
    if (!document.getElementById('methodModal').hidden) closeMethodModal();
    if (!document.getElementById('payModal').hidden) closePayModal();
  });

  document.getElementById('payModalSubmit').addEventListener('click', async function () {
    if (!pendingInvoiceId || !payjp || !cardElement || !client) return;
    const submitButton = this;
    hidePayError();
    submitButton.disabled = true;
    submitButton.textContent = '処理中…';
    try {
      const tokenResult = await payjp.createToken(cardElement);
      if (tokenResult.error) { showPayError(tokenResult.error.message || 'カード情報を確認してください。'); return; }
      const sessionResult = await client.auth.getSession();
      const accessToken = sessionResult.data.session?.access_token;
      if (!accessToken) { showPayError('セッションが切れています。再度ログインしてください。'); return; }
      const chargeResponse = await fetch('/api/charge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + accessToken },
        body: JSON.stringify({ invoiceId: pendingInvoiceId, cardToken: tokenResult.id })
      });
      const result = await chargeResponse.json();
      if (result.success) {
        closePayModal();
        await loadInvoice();
        setup(application);
        show(result.message || 'お支払いが完了しました。', false);
      } else if (result.retryable === false) {
        closePayModal();
        await loadInvoice();
        setup(application);
        window.alert(result.message || '決済状況を確認できませんでした。しばらくしてから状態をご確認ください。');
      } else {
        showPayError(result.message || '決済に失敗しました。');
      }
    } catch (error) {
      console.error(error);
      showPayError('通信エラーが発生しました。時間をおいて再度お試しください。');
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = 'この内容で支払う';
    }
  });

  function render(messages) {
    conversation.innerHTML = messages.length ? messages.map(m => {
      const mine = local ? (role === 'employer' ? m.sender_id === 'employer-preview' : m.sender_id === 'seeker-preview') : m.sender_id === user.id;
      return '<article class="bubble' + (mine ? ' mine' : '') + '"><p>' + esc(m.body) + '</p><time>' + esc(new Date(m.created_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })) + '</time></article>';
    }).join('') : '<div class="empty">まだメッセージはありません。最初のメッセージを送信してください。</div>';
    conversation.scrollTop = conversation.scrollHeight;
  }

  async function loadMessages() {
    if (!client || !user || isPreview()) { render(demoMessages); return; }
    const r = await client.from('application_messages').select('*').eq('application_id', id).order('created_at', { ascending: true });
    if (r.error) { console.error(r.error); show('メッセージを読み込めませんでした。Supabaseのチャットポリシーをご確認ください。', true); return; }
    render(r.data || []);
    const unread = (r.data || []).some(m => m.sender_id !== user.id && !m.read_at);
    if (unread) client.rpc('mark_messages_read', { p_application_id: id }).then(res => { if (res.error) console.error(res.error); });
  }

  async function load() {
    const demoApp = { id: 'preview-app', employer_id: 'employer-preview', user_id: 'seeker-preview', job_title: 'スポット看護師募集', facility_name: '新宿メディカルクリニック', seeker_name: '山田 花子', status: 'screening' };
    if (!client) { user = { id: previewUserId }; application = demoApp; setup(demoApp); render(demoMessages); return; }
    const s = await client.auth.getSession();
    user = s.data.session?.user;
    if (!user) {
      if (local) { user = { id: previewUserId }; application = demoApp; setup(demoApp); render(demoMessages); return; }
      location.href = 'login.html';
      return;
    }
    if (!id) { show('応募IDが指定されていません。応募管理から開いてください。', true); form.style.display = 'none'; return; }
    const r = await client.from('seeker_applications').select('*').eq('id', id).maybeSingle();
    if (r.error || !r.data) { console.error(r.error); show('応募情報を読み込めませんでした。参加者だけがメッセージを確認できます。', true); form.style.display = 'none'; return; }
    await refreshView(r.data);
    if (!(await window.MEDISPOT_ACCOUNT_GUARD.check(client, user, role))) return;
    await loadMessages();
    setInterval(loadMessages, 5000);
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const body = document.getElementById('messageBody').value.trim();
    if (!body) { show('メッセージを入力してください。', true); return; }
    if (looksSensitive(body) && !window.confirm('電話番号・住所・パスワードなど、個人情報や機密情報が含まれている可能性があります。\nこのまま送信しますか？')) return;
    const button = document.getElementById('sendButton');
    if (!client || !user || isPreview()) {
      demoMessages.push({ id: String(Date.now()), sender_id: role === 'employer' ? 'employer-preview' : 'seeker-preview', body, created_at: new Date().toISOString() });
      document.getElementById('messageBody').value = '';
      render(demoMessages);
      show('プレビュー上でメッセージを送信しました。', false);
      return;
    }
    button.disabled = true;
    button.textContent = '送信中…';
    const r = await client.from('application_messages').insert({ application_id: id, sender_id: user.id, body }).select().single();
    button.disabled = false;
    button.textContent = 'メッセージを送信';
    if (r.error) { console.error(r.error); show('メッセージを送信できませんでした。選考状態とチャットポリシーをご確認ください。', true); return; }
    document.getElementById('messageBody').value = '';
    await loadMessages();
  });
  document.getElementById('logoutButton').addEventListener('click', async () => { if (client) await client.auth.signOut(); location.href = 'login.html'; });
  load().catch(e => { console.error(e); show('チャットを読み込めませんでした。', true); });
})();
</script>
<script src="pwa-register.js"></script></body>
</html>
