<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>メッセージ | Medi Job</title><link rel="stylesheet" href="styles.css"><style>
body.chat-page{background:linear-gradient(180deg,#f4faff,#fff 52%,#f2faf8);color:var(--ink)}.main-nav{display:flex;justify-content:center;gap:clamp(12px,2vw,28px);flex:1;color:var(--blue-dark);font-size:13px;font-weight:900;white-space:nowrap}.main-nav a{padding:8px 0}.chat-shell{width:min(960px,calc(100% - 40px));margin:auto;padding:34px 0 70px}.chat-card{overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 46px rgba(0,63,125,.1)}.chat-head{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:22px 24px;background:linear-gradient(105deg,#f2f9ff,#effff6);border-bottom:1px solid #d9e8f2}.chat-head h1{margin:5px 0;color:var(--blue-dark);font-size:22px}.chat-head p{margin:0;color:var(--muted);font-size:12px;font-weight:800}.status{display:inline-flex;min-height:26px;align-items:center;padding:0 11px;color:var(--blue);background:#fff;border:1px solid #b9dbf5;border-radius:999px;font-size:11px;font-weight:900}.chat-actions{display:flex;flex-wrap:wrap;gap:8px}.conversation{display:grid;align-content:start;gap:13px;min-height:390px;max-height:540px;overflow:auto;padding:24px;background:#f8fbfd}.bubble{align-self:start;max-width:min(72%,620px);padding:12px 15px;background:#fff;border:1px solid #d9e7f0;border-radius:4px 14px 14px 14px;box-shadow:0 4px 12px rgba(0,63,125,.05)}.bubble.mine{justify-self:end;color:#fff;background:linear-gradient(135deg,var(--blue),#1683c9);border:0;border-radius:14px 4px 14px 14px}.bubble p{margin:0;white-space:pre-wrap;overflow-wrap:anywhere;font-size:14px;line-height:1.7;font-weight:700}.bubble time{display:block;margin-top:5px;color:var(--muted);font-size:10px}.bubble.mine time{color:rgba(255,255,255,.78)}.empty{margin:auto;color:var(--muted);font-size:13px;font-weight:800;text-align:center}.composer{padding:18px 20px;border-top:1px solid #d9e8f2}.composer textarea{width:100%;min-height:90px;padding:12px 14px;border:1px solid #c9d9e4;border-radius:9px;font:inherit;line-height:1.7;resize:vertical}.composer textarea:focus{outline:0;border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,91,172,.1)}.composer-row{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-top:10px}.composer-row span{color:var(--muted);font-size:11px;font-weight:700}.notice{display:none;margin:0 20px 14px;padding:12px 14px;border-radius:8px;font-size:12px;font-weight:900}.notice.show{display:block;color:#067044;background:#eafff3;border:1px solid #a8e4c2}.notice.error{display:block;color:#9d2d24;background:#fff2f0;border:1px solid #f1bbb5}.safety{padding:12px 20px;color:#49667d;background:#fffdf3;border-top:1px solid #efe5bc;font-size:11px;line-height:1.6;font-weight:800}@media(max-width:680px){.site-header{flex-wrap:wrap}.main-nav{order:3;width:100%;overflow-x:auto;justify-content:flex-start}.chat-shell{width:calc(100% - 24px);padding-top:18px}.chat-head,.composer-row{align-items:flex-start;flex-direction:column}.chat-actions,.chat-actions .btn,.composer-row .btn{width:100%}.conversation{min-height:360px;padding:16px}.bubble{max-width:88%}}
</style></head><body class="chat-page"><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark"><span></span></span><span class="brand-text"><strong>Medi Job</strong><small>Medical Spot Job</small></span></a><nav class="main-nav" id="roleNav"></nav><button class="btn btn-outline" id="logoutButton" type="button">ログアウト</button></header><main class="chat-shell"><article class="chat-card"><header class="chat-head"><div><span class="status" id="applicationStatus">読み込み中</span><h1 id="chatTitle">メッセージ</h1><p id="participantText">応募情報を確認しています…</p></div><div class="chat-actions" id="chatActions"></div></header><section class="conversation" id="conversation" aria-live="polite"><div class="empty">メッセージを読み込んでいます…</div></section><p class="safety">安全のため、住所・個人の電話番号・パスワードなどの機密情報は送信しないでください。勤務条件はこのチャット内で確認できます。</p><div class="notice" id="notice"></div><form class="composer" id="messageForm"><textarea id="messageBody" maxlength="2000" required placeholder="勤務日、仕事内容、持ち物などを確認できます。"></textarea><div class="composer-row"><span>Enterで改行できます。最大2,000文字。</span><button class="btn btn-green" id="sendButton" type="submit">メッセージを送信</button></div></form></article></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>
(function(){const config=window.MEDISPOT_SUPABASE||{};const configured=config.url&&config.anonKey&&!config.url.includes('YOUR_PROJECT_ID')&&!config.anonKey.includes('YOUR_SUPABASE_ANON_KEY');const client=configured&&window.supabase?window.supabase.createClient(config.url,config.anonKey):null;const local=location.hostname==='localhost'||location.hostname==='127.0.0.1';const params=new URLSearchParams(location.search);const id=params.get('id');const previewUserId=params.get('role')==='seeker'?'seeker-preview':'employer-preview';const form=document.getElementById('messageForm');const conversation=document.getElementById('conversation');const notice=document.getElementById('notice');let user=null;let application=null;let role='seeker';let demoMessages=[{id:'1',sender_id:'seeker-preview',body:'応募いたしました。勤務日の詳細を確認したいです。',created_at:new Date().toISOString()},{id:'2',sender_id:'employer-preview',body:'ご応募ありがとうございます。金曜日9時からの勤務を予定しています。',created_at:new Date().toISOString()}];function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function show(text,error){notice.className='notice '+(error?'error':'show');notice.textContent=text}function setup(app){application=app;role=user&&app.employer_id===user.id?'employer':'seeker';document.getElementById('applicationStatus').textContent=app.status;document.getElementById('chatTitle').textContent=app.job_title||'応募メッセージ';document.getElementById('participantText').textContent=role==='employer'?(app.seeker_name||'求職者')+'さんとのメッセージ':(app.facility_name||'医療機関')+'とのメッセージ';document.getElementById('roleNav').innerHTML=role==='employer'?'<a href="employer-dashboard.html">ダッシュボード</a><a href="employer-applications.html">応募者管理</a>':'<a href="seeker-dashboard.html">ダッシュボード</a><a href="seeker-applications.html">応募管理</a>';const actions=document.getElementById('chatActions');actions.innerHTML=(role==='employer'&&app.status==='選考中'?'<button class="btn btn-green" id="hireButton" type="button">採用・稼働決定</button>':'')+'<a class="btn btn-outline" href="'+(role==='employer'?'employer-applications.html':'seeker-applications.html')+'">一覧へ戻る</a>';const hire=document.getElementById('hireButton');if(hire)hire.addEventListener('click',hireApplicant)}function render(messages){conversation.innerHTML=messages.length?messages.map(m=>{const mine=local?(role==='employer'?m.sender_id==='employer-preview':m.sender_id==='seeker-preview'):m.sender_id===user.id;return '<article class="bubble'+(mine?' mine':'')+'"><p>'+esc(m.body)+'</p><time>'+esc(new Date(m.created_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}))+'</time></article>'}).join(''):'<div class="empty">まだメッセージはありません。最初のメッセージを送信してください。</div>';conversation.scrollTop=conversation.scrollHeight}async function loadMessages(){if(!client||!user||local&&String(user.id).includes('preview')){render(demoMessages);return}const r=await client.from('application_messages').select('*').eq('application_id',id).order('created_at',{ascending:true});if(r.error){console.error(r.error);show('メッセージを読み込めませんでした。Supabaseのチャットポリシーをご確認ください。',true);return}render(r.data||[])}async function hireApplicant(){if(!client||!user||local&&String(user.id).includes('preview')){application.status='採用決定';setup(application);show('プレビュー上で採用・稼働決定に変更しました。',false);return}const r=await client.from('seeker_applications').update({status:'採用決定'}).eq('id',id).eq('employer_id',user.id).select().single();if(r.error){console.error(r.error);show('採用状態を更新できませんでした。',true);return}setup(r.data);show('採用・稼働決定として更新しました。',false)}async function load(){if(!client){user={id:previewUserId};setup({id:'preview-app',employer_id:'employer-preview',user_id:'seeker-preview',job_title:'スポット看護師募集',facility_name:'新宿メディカルクリニック',seeker_name:'山田 花子',status:'選考中'});render(demoMessages);return}const s=await client.auth.getSession();user=s.data.session?.user;if(!user){if(local){user={id:previewUserId};setup({id:'preview-app',employer_id:'employer-preview',user_id:'seeker-preview',job_title:'スポット看護師募集',facility_name:'新宿メディカルクリニック',seeker_name:'山田 花子',status:'選考中'});render(demoMessages);return}location.href='login.html';return}if(!id){show('応募IDが指定されていません。応募管理から開いてください。',true);form.style.display='none';return}const r=await client.from('seeker_applications').select('*').eq('id',id).maybeSingle();if(r.error||!r.data){console.error(r.error);show('応募情報を読み込めませんでした。参加者だけがメッセージを確認できます。',true);form.style.display='none';return}setup(r.data);await loadMessages();setInterval(loadMessages,5000)}form.addEventListener('submit',async e=>{e.preventDefault();const body=document.getElementById('messageBody').value.trim();if(!body)return;const button=document.getElementById('sendButton');if(!client||!user||local&&String(user.id).includes('preview')){demoMessages.push({id:String(Date.now()),sender_id:role==='employer'?'employer-preview':'seeker-preview',body,created_at:new Date().toISOString()});document.getElementById('messageBody').value='';render(demoMessages);show('プレビュー上でメッセージを送信しました。',false);return}button.disabled=true;button.textContent='送信中…';const r=await client.from('application_messages').insert({application_id:id,sender_id:user.id,body}).select().single();button.disabled=false;button.textContent='メッセージを送信';if(r.error){console.error(r.error);show('メッセージを送信できませんでした。選考状態とチャットポリシーをご確認ください。',true);return}document.getElementById('messageBody').value='';await loadMessages()});document.getElementById('logoutButton').addEventListener('click',async()=>{if(client)await client.auth.signOut();location.href='login.html'});load().catch(e=>{console.error(e);show('チャットを読み込めませんでした。',true)})})();
</script></body></html>
