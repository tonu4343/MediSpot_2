<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>応募者管理 | Medi Job</title><link rel="stylesheet" href="styles.css"><style>
body.app-page{background:linear-gradient(180deg,#f4faff,#fff 48%,#f2faf8);color:var(--ink)}.app-shell{width:min(1120px,calc(100% - 40px));margin:auto;padding:42px 0 72px}.dashboard-nav{display:flex;justify-content:center;gap:clamp(12px,2vw,28px);flex:1;color:var(--blue-dark);font-size:13px;font-weight:900}.logout-btn{min-height:38px;padding:0 18px;color:var(--blue);background:#fff;border:1px solid var(--blue);border-radius:8px;font-weight:900}.page-head{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:24px}.page-head h1{margin:0;color:var(--blue-dark);font-size:clamp(34px,4vw,48px);font-weight:900}.page-head p{margin:10px 0 0;color:var(--muted);font-weight:800}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}.summary article,.app-card,.empty{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 34px rgba(0,63,125,.07)}.summary article{padding:18px}.summary span{color:var(--muted);font-size:12px;font-weight:900}.summary strong{display:block;margin-top:4px;color:var(--blue);font-size:28px}.app-list{display:grid;gap:14px}.app-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:20px;align-items:center;padding:22px}.status{display:inline-flex;min-height:28px;align-items:center;padding:0 12px;color:var(--blue);background:#edf7ff;border:1px solid #b9dbf5;border-radius:999px;font-size:12px;font-weight:900}.app-card h2{margin:10px 0 5px;color:var(--blue-dark);font-size:19px}.meta{margin:4px 0;color:var(--muted);font-size:13px;line-height:1.7;font-weight:800}.app-message{margin:12px 0 0;padding:12px 14px;color:#37566f;background:#f7fbff;border-radius:8px;font-size:13px;line-height:1.7}.actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:9px}.empty{padding:38px;text-align:center;color:var(--muted);font-weight:800}.notice{display:none;margin-bottom:16px;padding:13px 15px;border-radius:9px;font-size:13px;font-weight:900}.notice.error{display:block;color:#9d2d24;background:#fff2f0;border:1px solid #f1bbb5}@media(max-width:760px){.site-header{flex-wrap:wrap}.dashboard-nav{order:3;width:100%;justify-content:flex-start;overflow-x:auto}.app-shell{width:calc(100% - 28px)}.page-head,.app-card{grid-template-columns:1fr;display:grid;align-items:start}.summary{grid-template-columns:1fr}.actions{justify-content:flex-start}.actions .btn{width:100%}}
</style></head><body class="app-page"><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark"><span></span></span><span class="brand-text"><strong>Medical Spot Job</strong><small>Medi Job</small></span></a><nav class="dashboard-nav"><a href="employer-dashboard.html">ダッシュボード</a><a href="employer-job-new.html">求人作成</a><a href="employer-applications.html">応募者管理</a><a href="employer-dashboard.html#profile">施設情報</a></nav><button class="logout-btn" id="logoutButton" type="button">ログアウト</button></header><main class="app-shell"><div class="page-head"><div><h1>応募者管理</h1><p>応募者の資格と希望条件を確認し、選考・メッセージへ進めます。</p></div><a class="btn btn-green" href="employer-job-new.html">新しい求人を作成</a></div><section class="summary"><article><span>新着応募</span><strong id="newCount">0</strong></article><article><span>選考中</span><strong id="selectionCount">0</strong></article><article><span>採用決定</span><strong id="hiredCount">0</strong></article></section><div class="notice" id="notice"></div><section class="app-list" id="applicationList"><div class="empty">応募情報を読み込んでいます…</div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>
(function(){const config=window.MEDISPOT_SUPABASE||{};const configured=config.url&&config.anonKey&&!config.url.includes('YOUR_PROJECT_ID')&&!config.anonKey.includes('YOUR_SUPABASE_ANON_KEY');const client=configured&&window.supabase?window.supabase.createClient(config.url,config.anonKey):null;const local=location.hostname==='localhost'||location.hostname==='127.0.0.1';const list=document.getElementById('applicationList');let user=null;let apps=[];const demo=[{id:'preview-app',job_title:'スポット看護師募集',seeker_name:'山田 花子',seeker_email:'hanako@example.com',seeker_profession:'看護師',status:'応募済み',message:'外来経験があります。勤務条件について相談を希望します。',created_at:new Date().toISOString()}];function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function counts(){document.getElementById('newCount').textContent=apps.filter(a=>a.status==='応募済み').length;document.getElementById('selectionCount').textContent=apps.filter(a=>a.status==='選考中').length;document.getElementById('hiredCount').textContent=apps.filter(a=>a.status==='採用決定').length}function render(){counts();list.innerHTML=apps.length?apps.map(a=>{const fresh=a.status==='応募済み';return '<article class="app-card"><div><span class="status">'+esc(a.status)+'</span><h2>'+esc(a.seeker_name||'求職者')+' <small>／ '+esc(a.seeker_profession||'医療資格者')+'</small></h2><p class="meta">応募求人：'+esc(a.job_title||'医療求人')+'</p><p class="meta">応募日：'+esc((a.created_at||'').slice(0,10))+'</p>'+(a.message?'<p class="app-message">'+esc(a.message)+'</p>':'')+'</div><div class="actions">'+(fresh?'<button class="btn btn-green start-selection" data-id="'+esc(a.id)+'" type="button">選考を開始</button>':'<a class="btn btn-blue" href="application-chat.html?id='+encodeURIComponent(a.id)+'">メッセージ</a>')+'</div></article>'}).join(''):'<div class="empty">まだ応募者はいません。求人への応募が届くと、ここに表示されます。</div>';document.querySelectorAll('.start-selection').forEach(btn=>btn.addEventListener('click',()=>start(btn.dataset.id,btn)))}async function start(id,button){if(!client||!user){const a=apps.find(x=>x.id===id);if(a)a.status='選考中';render();location.href='application-chat.html?id='+encodeURIComponent(id);return}button.disabled=true;button.textContent='開始しています…';const r=await client.from('seeker_applications').update({status:'選考中'}).eq('id',id).eq('employer_id',user.id).select().single();if(r.error){console.error(r.error);button.disabled=false;button.textContent='選考を開始';const n=document.getElementById('notice');n.className='notice error';n.textContent='選考を開始できませんでした。Supabaseの応募者管理ポリシーをご確認ください。';return}location.href='application-chat.html?id='+encodeURIComponent(id)}async function load(){if(!client){apps=demo;render();return}const s=await client.auth.getSession();user=s.data.session?.user;if(!user){if(local){apps=demo;render();return}location.href='login.html?role=employer';return}const jobFilter=new URLSearchParams(location.search).get('job');let q=client.from('seeker_applications').select('*').eq('employer_id',user.id).order('created_at',{ascending:false});if(jobFilter)q=q.eq('job_id',jobFilter);const r=await q;if(r.error){console.error(r.error);const n=document.getElementById('notice');n.className='notice error';n.textContent='応募者を読み込めませんでした。Supabaseの応募者閲覧ポリシーをご確認ください。';apps=[]}else apps=r.data||[];render()}document.getElementById('logoutButton').addEventListener('click',async()=>{if(client)await client.auth.signOut();location.href='login.html'});load().catch(e=>{console.error(e);list.innerHTML='<div class="empty">応募者情報を読み込めませんでした。</div>'})})();
</script></body></html>
