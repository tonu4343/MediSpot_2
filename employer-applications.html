<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>応募者・メッセージ | Medi Job</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#005bac"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="icon" href="assets/icon-32.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.applications-page { background: linear-gradient(180deg, #f4faff 0%, #ffffff 46%, #f2faf8 100%); color: var(--ink); }
    .dashboard-nav { display: flex; justify-content: center; gap: clamp(12px, 2vw, 28px); flex: 1; color: var(--blue-dark); font-size: 13px; font-weight: 900; white-space: nowrap; }
    .dashboard-nav a { padding: 8px 0; }
    .apps-shell { width: min(1120px, calc(100% - 40px)); margin: 0 auto; padding: 34px 0 72px; }

    .hero-card, .stat-card, .panel-card, .app-card, .empty { background: rgba(255,255,255,.96); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 18px 42px rgba(0,63,125,.09); }
    .hero-card { position: relative; overflow: hidden; padding: clamp(26px,4vw,38px); margin-bottom: 22px; }
    .hero-card::before { content: ""; position: absolute; z-index: 0; right: -120px; top: -170px; width: 400px; height: 400px; border: 68px solid rgba(0,91,172,.08); border-radius: 50%; }
    .hero-card::after { content: ""; position: absolute; z-index: 0; left: 42%; bottom: -160px; width: 320px; height: 320px; background: radial-gradient(circle, rgba(33,183,97,.12), rgba(0,91,172,.05) 62%, transparent 68%); }
    .hero-card > * { position: relative; z-index: 2; }
    .eyebrow { display: inline-flex; align-items: center; min-height: 28px; padding: 0 14px; border-radius: 999px; color: var(--green-dark); background: #ecfff5; border: 1px solid #b8ebcf; font-size: 12px; font-weight: 900; }
    .hero-card h1 { margin: 14px 0 10px; color: var(--blue-dark); font-size: clamp(26px,3.4vw,38px); line-height: 1.28; font-weight: 900; }
    .hero-card h1 span { color: var(--green-dark); }
    .hero-card p { margin: 0; color: var(--muted); font-size: 14px; font-weight: 800; line-height: 1.8; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin-bottom: 22px; }
    .stat-card { padding: 20px 22px; }
    .stat-card span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .stat-card strong { display: block; margin-top: 6px; color: var(--blue); font-size: 30px; line-height: 1; font-weight: 900; }
    .stat-card.stat-new strong { color: var(--blue); }
    .stat-card.stat-selection strong { color: #d9822b; }
    .stat-card.stat-hired strong { color: var(--green-dark); }

    .notice { display: none; margin-bottom: 18px; padding: 13px 16px; border-radius: 10px; font-size: 13px; font-weight: 900; }
    .notice.error { display: block; color: #9d2d24; background: #fff2f0; border: 1px solid #f1bbb5; }

    .apps-panel { padding: clamp(22px,3.4vw,28px); }
    .section-title-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .section-title-row h2 { margin: 0; color: var(--blue-dark); font-size: 20px; font-weight: 900; }

    .app-list { display: grid; gap: 14px; }
    .app-card { display: grid; grid-template-columns: 52px minmax(0,1fr) auto; gap: 18px; align-items: start; padding: 20px; transition: transform .18s ease, box-shadow .18s ease; }
    .app-card:hover { transform: translateY(-2px); box-shadow: 0 22px 46px rgba(0,63,125,.13); }
    .app-avatar { display: grid; place-items: center; width: 52px; height: 52px; color: #fff; background: var(--blue); border-radius: 50%; font-size: 18px; font-weight: 900; }
    .app-card-top { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 8px; }
    .status { display: inline-flex; min-height: 26px; align-items: center; padding: 0 12px; color: var(--blue); background: #edf7ff; border: 1px solid #b9dbf5; border-radius: 999px; font-size: 12px; font-weight: 900; }
    .status.status-selection { color: #b5670f; background: #fff6e9; border-color: #f2cf9c; }
    .status.status-hired { color: var(--green-dark); background: #ecfff5; border-color: #b8ebcf; }
    .status.status-working { color: var(--blue); background: #edf7ff; border-color: #b9dbf5; }
    .status.status-completed { color: #5b6270; background: #eef1f5; border-color: #ccd3dd; }
    .status.status-rejected { color: #b3261e; background: #fdecea; border-color: #f3b6b0; }
    .applied-date { color: var(--muted); font-size: 12px; font-weight: 800; }
    .app-card h3 { margin: 0 0 6px; color: var(--blue-dark); font-size: 18px; font-weight: 900; }
    .app-card h3 small { color: var(--muted); font-size: 13px; font-weight: 800; }
    .meta { margin: 0 0 4px; color: #4e6578; font-size: 13px; font-weight: 800; line-height: 1.7; }
    .app-message { position: relative; margin: 10px 0 0; padding: 12px 14px 12px 32px; color: #37566f; background: #f7fbff; border: 1px solid #e1eef8; border-radius: 8px; font-size: 13px; line-height: 1.7; }
    .app-message::before { content: "\201C"; position: absolute; left: 10px; top: 6px; color: #acd3f1; font-family: Georgia, serif; font-size: 24px; font-weight: 900; }
    .actions { display: flex; flex-direction: column; align-items: stretch; gap: 9px; min-width: 168px; }
    .actions .btn { width: 100%; }

    .empty { padding: 40px 20px; text-align: center; background: #f7fbff; border: 1px dashed #bcd8eb; border-radius: 12px; box-shadow: none; }
    .empty strong { display: block; color: var(--blue-dark); font-size: 16px; margin-bottom: 6px; }
    .empty span { display: block; color: var(--muted); font-size: 13px; font-weight: 700; }

    @media (max-width: 960px) {
      .site-header { flex-wrap: wrap; }
      .dashboard-nav { order: 3; width: 100%; overflow-x: auto; justify-content: flex-start; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 700px) {
      .apps-shell { width: calc(100% - 28px); }
      .stats-grid { grid-template-columns: 1fr; }
      .app-card { grid-template-columns: 44px minmax(0,1fr); }
      .app-avatar { width: 44px; height: 44px; font-size: 15px; }
      .actions { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; min-width: 0; margin-top: 6px; }
      .actions .btn { flex: 1 1 140px; width: auto; }
    }
  </style>
</head>
<body class="applications-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Medi Job ホーム"><span class="brand-mark" aria-hidden="true"><span></span></span><span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span></a>
    <nav class="dashboard-nav" aria-label="求人者メニュー"><a href="employer-dashboard.html">ダッシュボード</a><a href="employer-job-new.html">求人作成</a><a href="employer-dashboard.html#jobs">求人管理</a><a href="employer-applications.html">応募者・メッセージ</a><a href="employer-profile.html">施設情報</a></nav>
    <div class="header-actions"><button class="btn btn-outline" id="logoutButton" type="button">ログアウト</button></div>
  </header>

  <main class="apps-shell">
    <section class="hero-card">
      <span class="eyebrow">応募者・メッセージ</span>
      <h1>応募者の資格と希望条件を確認し、<br><span>選考・メッセージへ進めましょう</span></h1>
      <p>応募が届いた求職者のプロフィールを確認し、条件が合う方には選考を開始できます。選考開始後はチャットで勤務条件をすり合わせできます。</p>
      <div class="hero-actions"><a class="btn btn-outline" href="employer-dashboard.html">ダッシュボードへ戻る</a><a class="btn btn-green" href="employer-job-new.html">新しい求人を作成</a></div>
    </section>

    <section class="stats-grid" aria-label="応募状況">
      <article class="stat-card stat-new"><span>新着応募</span><strong id="newCount">0</strong></article>
      <article class="stat-card stat-selection"><span>選考中</span><strong id="selectionCount">0</strong></article>
      <article class="stat-card stat-hired"><span>採用決定</span><strong id="hiredCount">0</strong></article>
    </section>

    <div class="notice" id="notice"></div>

    <section class="panel-card apps-panel">
      <div class="section-title-row"><h2>応募者一覧</h2></div>
      <div class="app-list" id="applicationList"><div class="empty"><strong>読み込み中</strong><span>応募情報を読み込んでいます…</span></div></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script><script src="account-guard.js"></script>
  <script src="application-status.js"></script>
  <script>
    (function () {
      const config = window.MEDISPOT_SUPABASE || {};
      const configured = config.url && config.anonKey && !config.url.includes("YOUR_PROJECT_ID") && !config.anonKey.includes("YOUR_SUPABASE_ANON_KEY");
      const client = configured && window.supabase ? window.supabase.createClient(config.url, config.anonKey) : null;
      const local = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      const list = document.getElementById("applicationList");
      let user = null;
      let apps = [];

      const demo = [{
        id: "preview-app",
        job_title: "スポット看護師募集",
        seeker_name: "山田 花子",
        seeker_email: "hanako@example.com",
        seeker_profession: "看護師",
        status: "applied",
        message: "外来経験があります。勤務条件について相談を希望します。",
        created_at: new Date().toISOString()
      }];

      function esc(v) { return String(v || "").replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]; }); }
      function initial(name) { return (name || "求").trim().charAt(0).toUpperCase() || "求"; }
      function formatInterviewAt(value) { return value ? new Date(value).toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) : null; }
      // work_start_at is a bare "date" column; parsing with `new Date(string)`
      // treats it as UTC midnight and can shift the day depending on the
      // browser's timezone, so build the local date explicitly.
      function formatWorkStartAt(value) { if (!value) return null; const parts = String(value).split("-").map(Number); const d = new Date(parts[0], (parts[1] || 1) - 1, parts[2] || 1); return Number.isNaN(d.getTime()) ? null : d.toLocaleDateString("ja-JP", { year: "numeric", month: "numeric", day: "numeric" }); }
      function counts() {
        document.getElementById("newCount").textContent = apps.filter(function (a) { return a.status === "applied"; }).length;
        document.getElementById("selectionCount").textContent = apps.filter(function (a) { return window.MEDISPOT_STATUS.isPreHire(a.status) && a.status !== "applied"; }).length;
        document.getElementById("hiredCount").textContent = apps.filter(function (a) { return window.MEDISPOT_STATUS.isHiredOrLater(a.status); }).length;
      }

      function render() {
        counts();
        list.innerHTML = apps.length ? apps.map(function (a) {
          const fresh = a.status === "applied";
          const scheduleParts = [];
          const interviewAt = formatInterviewAt(a.interview_at);
          const workStartAt = formatWorkStartAt(a.work_start_at);
          if (interviewAt) scheduleParts.push("面接日時：" + interviewAt);
          if (workStartAt) scheduleParts.push("勤務開始日：" + workStartAt);
          return '<article class="app-card">'
            + '<span class="app-avatar">' + esc(initial(a.seeker_name)) + '</span>'
            + '<div><div class="app-card-top"><span class="status ' + window.MEDISPOT_STATUS.cssClass(a.status) + '">' + esc(window.MEDISPOT_STATUS.label(a.status)) + '</span><span class="applied-date">応募日：' + esc((a.created_at || "").slice(0, 10)) + '</span></div>'
            + '<h3>' + esc(a.seeker_name || "求職者") + ' <small>／ ' + esc(a.seeker_profession || "医療資格者") + '</small></h3>'
            + '<p class="meta">応募求人：' + esc(a.job_title || "医療求人") + '</p>'
            + (scheduleParts.length ? '<p class="meta" style="color:var(--blue-dark);font-weight:900;">' + esc(scheduleParts.join("　／　")) + '</p>' : '')
            + (a.message ? '<p class="app-message">' + esc(a.message) + '</p>' : '')
            + '</div>'
            + '<div class="actions"><a class="btn btn-outline" href="employer-applicant.html?id=' + encodeURIComponent(a.id) + '">プロフィールを見る</a>'
            + (fresh ? '<button class="btn btn-green start-selection" data-id="' + esc(a.id) + '" type="button">選考を開始</button>' : '<a class="btn btn-blue" href="application-chat.html?id=' + encodeURIComponent(a.id) + '">メッセージ</a>')
            + '</div></article>';
        }).join("") : '<div class="empty"><strong>まだ応募者はいません</strong><span>求人への応募が届くと、ここに表示されます。</span></div>';
        document.querySelectorAll(".start-selection").forEach(function (btn) { btn.addEventListener("click", function () { start(btn.dataset.id, btn); }); });
      }

      async function start(id, button) {
        if (!client || !user) {
          const a = apps.find(function (x) { return x.id === id; });
          if (a) a.status = "screening";
          render();
          location.href = "application-chat.html?id=" + encodeURIComponent(id);
          return;
        }
        button.disabled = true;
        button.textContent = "開始しています…";
        const rpcResult = await client.rpc("employer_update_application_status", { p_application_id: id, p_status: "screening" });
        const r = rpcResult.error ? rpcResult : await client.from("seeker_applications").select("*").eq("id", id).maybeSingle();
        if (r.error || !r.data) {
          console.error(r.error);
          button.disabled = false;
          button.textContent = "選考を開始";
          const n = document.getElementById("notice");
          n.className = "notice error";
          n.textContent = "選考を開始できませんでした。Supabaseの応募者管理ポリシーをご確認ください。";
          return;
        }
        location.href = "application-chat.html?id=" + encodeURIComponent(id);
      }

      async function load() {
        if (!client) { apps = demo; render(); return; }
        const s = await client.auth.getSession();
        user = s.data.session?.user;
        if (!user) {
          if (local) { apps = demo; render(); return; }
          location.href = "login.html?role=employer";
          return;
        }
        if (!(await window.MEDISPOT_ACCOUNT_GUARD.check(client, user, "employer"))) return;
        const jobFilter = new URLSearchParams(location.search).get("job");
        let q = client.from("seeker_applications").select("*").eq("employer_id", user.id).order("created_at", { ascending: false });
        if (jobFilter) q = q.eq("job_id", jobFilter);
        const r = await q;
        if (r.error) {
          console.error(r.error);
          const n = document.getElementById("notice");
          n.className = "notice error";
          n.textContent = "応募者を読み込めませんでした。Supabaseの応募者閲覧ポリシーをご確認ください。";
          apps = [];
        } else {
          apps = r.data || [];
        }
        render();
      }

      document.getElementById("logoutButton").addEventListener("click", async function () { if (client) await client.auth.signOut(); location.href = "login.html"; });
      load().catch(function (e) { console.error(e); list.innerHTML = '<div class="empty"><strong>読み込みエラー</strong><span>応募者情報を読み込めませんでした。</span></div>'; });
    })();
  </script>
<script src="pwa-register.js"></script></body>
</html>
