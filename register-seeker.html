<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#27714;&#32887;&#32773;&#30331;&#37682; | Medi Job</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { --seeker-teal: #16a394; --soft-bg: #f3fafb; }
    body.seeker-register-page { background: linear-gradient(180deg, #f6fbff 0%, #ffffff 48%, #f4fafb 100%); color: var(--blue-dark); }
    .register-shell { padding: 72px clamp(20px, 5vw, 64px) 74px; }
    .register-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 28px;
      width: min(1240px, 100%);
      margin: 0 auto;
      align-items: start;
    }
    .register-card-main, .side-card {
      background: rgba(255,255,255,.96);
      border: 1px solid #d6e8f4;
      border-radius: 10px;
      box-shadow: 0 22px 54px rgba(0, 63, 125, .10);
    }
    .register-card-main { padding: clamp(28px, 4vw, 42px); }
    .register-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 32px; }
    .register-title-row h1 { margin: 0 0 12px; color: #0f172a; font-size: clamp(38px, 5vw, 60px); line-height: 1.12; font-weight: 900; letter-spacing: 0; }
    .register-title-row p { margin: 0; color: #526172; font-size: 17px; font-weight: 800; line-height: 1.8; }
    .role-pill { display: inline-flex; align-items: center; min-height: 48px; padding: 0 20px; color: #007a6c; background: #dcf7f0; border-radius: 999px; font-size: 16px; font-weight: 900; white-space: nowrap; }
    .form-section-title { margin: 34px 0 18px; padding-bottom: 16px; border-bottom: 1px solid #dce8f0; color: #0f172a; font-size: 25px; font-weight: 900; }
    .form-section-title:first-of-type { margin-top: 0; }
    .form-note { margin: 20px 0 0; padding: 18px 20px; color: #496171; background: #f3fbff; border: 1px solid #d7e9f5; border-radius: 8px; font-size: 15px; font-weight: 800; line-height: 1.8; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px 22px; }
    .field.full { grid-column: 1 / -1; }
    .field label { display: block; margin-bottom: 8px; color: #102338; font-size: 16px; font-weight: 900; }
    .required { color: #d92735; margin-left: 4px; }
    .input, .textarea {
      width: 100%; min-height: 56px; padding: 0 16px; color: #102338; background: #fff;
      border: 1px solid #cfdfe9; border-radius: 8px; font: inherit; font-size: 16px; outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .textarea { min-height: 156px; padding-top: 14px; resize: vertical; line-height: 1.7; }
    .input:focus, .textarea:focus { border-color: var(--seeker-teal); box-shadow: 0 0 0 4px rgba(22, 163, 148, .13); }
    .check-grid { display: flex; flex-wrap: wrap; gap: 10px; min-height: 38px; align-items: center; }
    .check-pill { position: relative; cursor: pointer; }
    .check-pill input { position: absolute; opacity: 0; }
    .check-pill span { display: inline-flex; align-items: center; min-height: 38px; padding: 0 15px; color: var(--blue); background: #f4fbff; border: 1px solid #acd3f1; border-radius: 999px; font-size: 14px; font-weight: 900; }
    .check-pill input:checked + span { color: #007a52; border-color: #7ed5a0; background: #effdf6; }
    .check-grid-placeholder { color: #697a8b; font-size: 14px; font-weight: 800; }
    .terms-row { display: flex; gap: 12px; align-items: flex-start; margin-top: 28px; color: #243b53; font-size: 15px; font-weight: 900; line-height: 1.6; }
    .terms-row input { width: 20px; height: 20px; margin-top: 2px; accent-color: var(--seeker-teal); }
    .password-field { position: relative; }
    .password-field .input { padding-right: 94px; }
    .password-toggle { position: absolute; right: 8px; bottom: 8px; min-height: 40px; padding: 0 12px; color: var(--seeker-teal); background: #f0faf8; border: 1px solid #a9ddd8; border-radius: 7px; font-size: 13px; font-weight: 900; cursor: pointer; }
    .password-toggle:hover { background: #e4f7f3; }
    .submit-row { margin-top: 28px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .submit-row .wide-cta { min-width: 260px; min-height: 58px; margin: 0; border: 0; border-radius: 8px; background: linear-gradient(180deg, #1ab79f, #119f91); box-shadow: 0 15px 28px rgba(22, 163, 148, .24); font-size: 18px; cursor: pointer; }
    .back-button { min-height: 58px; padding: 0 28px; color: #007a6c; background: #fff; border: 1px solid #a9ddd8; border-radius: 8px; font-size: 18px; font-weight: 900; }
    .form-message { display: none; color: #007a52; font-weight: 900; }
    .side-stack { display: grid; gap: 18px; position: sticky; top: 96px; }
    .side-card { padding: 28px; }
    .side-card h2 { margin: 0 0 20px; color: #0f172a; font-size: 26px; font-weight: 900; }
    .side-card p { margin: 0; color: #526172; font-size: 17px; font-weight: 800; line-height: 1.7; }
    .steps-list { display: grid; gap: 16px; margin: 0; padding: 0; list-style: none; }
    .steps-list li { display: grid; grid-template-columns: 48px 1fr; gap: 14px; align-items: center; color: #0f172a; font-size: 18px; font-weight: 900; }
    .steps-list b { display: grid; place-items: center; width: 46px; height: 46px; color: #007a6c; background: #dcf7f0; border-radius: 10px; }
    .free-card strong { display: block; margin-bottom: 12px; color: #0f172a; font-size: 25px; font-weight: 900; }
    .free-card span { color: #526172; font-size: 17px; font-weight: 800; line-height: 1.7; }
    @media (max-width: 980px) { .register-layout { grid-template-columns: 1fr; } .side-stack { position: static; } }
    @media (max-width: 720px) { .register-shell { padding: 34px 16px 50px; } .register-card-main, .side-card { padding: 22px; } .register-title-row { display: block; } .role-pill { margin-top: 18px; } .form-grid { grid-template-columns: 1fr; } .submit-row .wide-cta, .back-button { width: 100%; } }
  </style>
</head>
<body class="seeker-register-page" id="top">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Medi Job home">
      <span class="brand-mark" aria-hidden="true"><span></span></span>
      <span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span>
    </a>
    <nav class="nav-links" aria-label="registration navigation">
      <a href="register-employer.html">&#27714;&#20154;&#32773;&#12399;&#12371;&#12385;&#12425;</a>
    </nav>
    <div class="header-actions">
      <a class="btn btn-outline" href="login.html">&#12525;&#12464;&#12452;&#12531;</a>
      <a class="btn btn-green" href="index.html">&#12488;&#12483;&#12503;&#12408;</a>
    </div>
  </header>

  <main class="register-shell">
    <div class="register-layout">
      <section class="register-card-main" aria-labelledby="registerTitle">
        <div class="register-title-row">
          <div>
            <h1 id="registerTitle">&#27714;&#32887;&#32773;&#30331;&#37682;</h1>
            <p>まずは基本情報だけで無料登録できます。スキル・履歴書・希望条件はログイン後に登録できます。</p>
          </div>
          <span class="role-pill">&#27714;&#32887;&#32773;</span>
        </div>

        <form id="profileForm" novalidate>
          <h2 class="form-section-title">&#12450;&#12459;&#12454;&#12531;&#12488;&#24773;&#22577;</h2>
          <div class="form-grid">
            <div class="field"><label for="lastName">&#22995; <span class="required">&#24517;&#38920;</span></label><input class="input" id="lastName" autocomplete="family-name" required></div>
            <div class="field"><label for="firstName">&#21517; <span class="required">&#24517;&#38920;</span></label><input class="input" id="firstName" autocomplete="given-name" required></div>
            <div class="field full"><label for="email">&#12513;&#12540;&#12523;&#12450;&#12489;&#12524;&#12473; <span class="required">&#24517;&#38920;</span></label><input class="input" id="email" type="email" autocomplete="email" required placeholder="example@example.com" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="ドメインを含む正しいメールアドレスの形式で入力してください（例：name@example.com）"></div>
            <div class="field password-field"><label for="password">&#12497;&#12473;&#12527;&#12540;&#12489; <span class="required">&#24517;&#38920;</span></label><input class="input" id="password" type="password" autocomplete="new-password" minlength="8" required placeholder="8&#25991;&#23383;&#20197;&#19978;"><button class="password-toggle" id="passwordToggle" type="button" aria-controls="password" aria-pressed="false">&#34920;&#31034;&#12377;&#12427;</button></div>
            <div class="field password-field"><label for="passwordConfirm">&#12497;&#12473;&#12527;&#12540;&#12489;&#30906;&#35469; <span class="required">&#24517;&#38920;</span></label><input class="input" id="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required placeholder="&#12418;&#12358;&#19968;&#24230;&#20837;&#21147;"><button class="password-toggle" id="passwordConfirmToggle" type="button" aria-controls="passwordConfirm" aria-pressed="false">&#34920;&#31034;&#12377;&#12427;</button></div>
          </div>

          <p class="form-note">登録後にマイページで電話番号、生年月日、スキル、履歴書、希望勤務地を追加できます。</p>

          <label class="terms-row"><input type="checkbox" required><span><a href="terms.html" target="_blank" rel="noopener">&#21033;&#29992;&#35215;&#32004;</a>&#12392;<a href="privacy.html" target="_blank" rel="noopener">&#12503;&#12521;&#12452;&#12496;&#12471;&#12540;&#12509;&#12522;&#12471;&#12540;</a>&#12395;&#21516;&#24847;&#12375;&#12414;&#12377;&#12290;</span></label>
          <div class="submit-row"><button class="wide-cta" type="submit">&#28961;&#26009;&#12391;&#30331;&#37682;&#12377;&#12427;</button><a class="back-button" href="register.html">&#25147;&#12427;</a><span class="form-message" id="formMessage">&#30331;&#37682;&#24460;&#12289;&#12525;&#12464;&#12452;&#12531;&#30011;&#38754;&#12408;&#31227;&#21205;&#12375;&#12414;&#12377;&#12290;</span></div>
        </form>
      </section>

      <aside class="side-stack" aria-label="registration help">
        <section class="side-card">
          <h2>&#30331;&#37682;&#24460;&#12398;&#27969;&#12428;</h2>
          <ol class="steps-list"><li><b>1</b><span>基本情報で登録</span></li><li><b>2</b><span>スキル・履歴書を追加</span></li><li><b>3</b><span>求人検索・応募</span></li><li><b>4</b><span>求人者とメッセージ</span></li></ol>
        </section>
        <section class="side-card free-card"><strong>登録は無料</strong><span>求人検索、応募、プロフィール作成、求人者とのメッセージを無料で利用できます。</span></section>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-forms.js"></script>
  <script>
    (function () {
      [["passwordToggle", "password"], ["passwordConfirmToggle", "passwordConfirm"]].forEach(function (pair) {
        const button = document.getElementById(pair[0]);
        const input = document.getElementById(pair[1]);
        if (!button || !input) return;
        button.addEventListener("click", function () {
          const showing = input.type === "text";
          input.type = showing ? "password" : "text";
          button.textContent = showing ? "表示する" : "隠す";
          button.setAttribute("aria-pressed", String(!showing));
        });
      });
    })();
  </script>
</body>
</html>
