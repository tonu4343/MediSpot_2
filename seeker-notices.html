<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ | Medi Job</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#005bac"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="icon" href="assets/icon-32.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.dashboard-page { color: var(--ink); background: #f5f9fc; }
    .site-header.seeker-topbar { position: sticky; top: 0; z-index: 70; }
    .seeker-topbar-right { display: flex; align-items: center; gap: 16px; }
    .bell-btn { position: relative; display: grid; place-items: center; width: 38px; height: 38px; color: var(--blue-dark); background: #f1f7fc; border: 1px solid var(--line); border-radius: 50%; cursor: pointer; }
    .bell-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .bell-btn .dot { position: absolute; top: 4px; right: 5px; min-width: 15px; height: 15px; padding: 0 3px; display: none; place-items: center; color: #fff; background: #e6483c; border: 2px solid #fff; border-radius: 999px; font-size: 9px; font-weight: 900; }
    .bell-btn .dot:not([hidden]) { display: grid; }
    .seeker-user { display: flex; align-items: center; gap: 9px; }
    .seeker-avatar { display: grid; place-items: center; width: 32px; height: 32px; color: #fff; background: var(--blue); border-radius: 50%; font-size: 12px; font-weight: 900; }
    .seeker-user strong { color: #14324c; font-size: 13px; font-weight: 900; }
    .logout-btn { min-height: 34px; padding: 0 14px; color: var(--blue); background: #fff; border: 1px solid var(--blue); border-radius: 8px; font-size: 12px; font-weight: 900; cursor: pointer; }

    .dash-body { display: grid; grid-template-columns: 230px 1fr; align-items: start; }
    .dash-sidebar { position: sticky; top: 65px; height: calc(100vh - 65px); overflow-y: auto; padding: 18px 14px 24px; background: #fff; border-right: 1px solid var(--line); }
    .side-nav { display: grid; gap: 3px; margin: 0 0 16px; padding: 0; list-style: none; }
    .side-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: #3c5266; border-radius: 9px; font-size: 13px; font-weight: 800; }
    .side-nav a svg { width: 18px; height: 18px; flex: 0 0 auto; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .side-nav a:hover { background: #f1f7fc; color: var(--blue-dark); }
    .side-nav a.active { color: #fff; background: linear-gradient(120deg, var(--blue), var(--blue-2)); box-shadow: 0 8px 18px rgba(0,91,172,.24); }
    .side-nav a .nav-badge { margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px; display: none; place-items: center; color: #fff; background: #e6483c; border-radius: 999px; font-size: 10px; font-weight: 900; }
    .side-nav a .nav-badge:not([hidden]) { display: grid; }
    .side-nav a.active .nav-badge { background: rgba(255,255,255,.28); }
    .side-nav a .nav-soon { margin-left: auto; color: var(--muted); background: #eef3f7; border-radius: 999px; padding: 1px 7px; font-size: 9.5px; font-weight: 900; }
    .support-card { padding: 15px; background: #f7fbff; border: 1px solid var(--line); border-radius: 12px; }
    .support-card strong { display: block; color: var(--blue-dark); font-size: 12.5px; font-weight: 900; }
    .support-card span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 700; }
    .support-card .support-phone { margin-top: 8px; color: var(--blue-dark); font-size: 17px; font-weight: 900; }
    .support-card a.support-cta { display: block; margin-top: 10px; text-align: center; min-height: 32px; line-height: 32px; color: var(--blue); background: #fff; border: 1px solid #acd3f1; border-radius: 7px; font-size: 11.5px; font-weight: 900; }

    .dash-main { min-width: 0; max-width: 880px; margin: 0 auto; padding: 26px clamp(16px,2.6vw,34px) 60px; }
    .page-head { margin-bottom: 20px; }
    .page-head h1 { margin: 0; color: var(--blue-dark); font-size: clamp(24px,3vw,32px); font-weight: 900; }
    .page-head p { margin: 8px 0 0; color: var(--muted); font-size: 13.5px; font-weight: 700; }

    .notice-list { display: grid; gap: 10px; }
    .notice-item { position: relative; display: flex; gap: 14px; padding: 18px; background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 8px 20px rgba(0,63,125,.05); }
    .notice-item.unread { border-color: #b9dbf5; background: #f7fbff; }
    .notice-icon { flex: 0 0 40px; display: grid; place-items: center; width: 40px; height: 40px; color: var(--blue); background: #eef6ff; border-radius: 50%; }
    .notice-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .notice-body { flex: 1; min-width: 0; }
    .notice-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .notice-top strong { color: var(--blue-dark); font-size: 15px; font-weight: 900; }
    .notice-top time { flex: 0 0 auto; color: var(--muted); font-size: 11.5px; font-weight: 700; }
    .notice-text { margin: 6px 0 0; color: #4e6578; font-size: 13px; font-weight: 700; line-height: 1.8; white-space: pre-line; }
    .notice-item.unread .notice-text { color: #14324c; }
    .unread-pip { position: absolute; top: 18px; right: 18px; width: 9px; height: 9px; background: #e6483c; border-radius: 50%; }
    .panel-empty { padding: 40px 20px; text-align: center; color: var(--muted); background: #f7fbff; border: 1px dashed #bcd8eb; border-radius: 12px; font-size: 13px; font-weight: 800; }

    @media (max-width: 960px) {
      .dash-body { grid-template-columns: 1fr; }
      .dash-sidebar { position: static; height: auto; display: flex; flex-wrap: nowrap; align-items: center; gap: 10px; overflow-x: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 12px; }
      .side-nav { display: flex; gap: 4px; margin: 0; flex: 0 0 auto; }
      .side-nav a { white-space: nowrap; }
      .side-nav a .nav-badge, .side-nav a .nav-soon { display: none; }
      .support-card { display: none; }
    }
    @media (max-width: 640px) {
      .dash-main { padding: 20px 14px 48px; }
      .notice-top { flex-direction: column; align-items: flex-start; gap: 2px; }
    }
  </style>
</head>
<body class="dashboard-page">
  <header class="site-header seeker-topbar">
    <a class="brand" href="index.html" aria-label="Medi Job ホーム"><span class="brand-mark" aria-hidden="true"><span></span></span><span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span></a>
    <div class="seeker-topbar-right">
      <button class="bell-btn" type="button" aria-label="通知"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c.5-.5 2-2 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg><span class="dot" id="unreadBadge" hidden>0</span></button>
      <div class="seeker-user"><span class="seeker-avatar" id="topbarInitial">求</span><strong id="topbarName">読み込み中</strong></div>
      <button class="logout-btn" id="logoutButton" type="button">ログアウト</button>
    </div>
  </header>

  <div class="dash-body">
    <aside class="dash-sidebar" aria-label="求職者メニュー">
      <ul class="side-nav">
        <li><a href="seeker-dashboard.html"><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg>ダッシュボード</a></li>
        <li><a href="seeker-jobs.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>求人を探す</a></li>
        <li><a href="seeker-applications.html"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>応募管理</a></li>
        <li><a href="seeker-messages.html"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/></svg>メッセージ<span class="nav-badge" id="sideMsgBadge" hidden></span></a></li>
        <li><a href="seeker-profile.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>プロフィール</a></li>
        <li><a href="seeker-resume.html"><svg viewBox="0 0 24 24"><path d="M6 2h9l3 3v17H6z"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>履歴書・職務経歴書</a></li>
        <li><a class="active" href="seeker-notices.html"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c.5-.5 2-2 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>お知らせ<span class="nav-badge" id="sideNoticeBadge" hidden></span></a></li>
        <li><a href="seeker-settings.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>設定</a></li>
      </ul>

      <div class="support-card">
        <strong>サポート窓口</strong>
        <span>平日 9:00〜18:00</span>
        <span class="support-phone">03-1234-5678</span>
        <a class="support-cta" href="#">お問い合わせ</a>
      </div>
    </aside>

    <main class="dash-main">
      <section class="page-head">
        <h1>お知らせ</h1>
        <p>Medi Job からのお知らせ・メンテナンス情報を確認できます。</p>
      </section>

      <section class="notice-list" id="noticeList"><div class="panel-empty">お知らせを読み込んでいます…</div></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="account-guard.js"></script>
  <script>
    (function () {
      const config = window.MEDISPOT_SUPABASE || {};
      const configured = config.url && config.anonKey && !config.url.includes("YOUR_PROJECT_ID") && !config.anonKey.includes("YOUR_SUPABASE_ANON_KEY");
      const supabaseClient = configured && window.supabase ? window.supabase.createClient(config.url, config.anonKey) : null;
      function text(id, value) { const el = document.getElementById(id); if (el) el.textContent = value || "-"; }
      function esc(value) { return String(value || "").replace(/[&<>\"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c]; }); }
      function initial(name) { return (name || "求").trim().charAt(0).toUpperCase() || "求"; }
      function formatDate(value) { return value ? new Date(value).toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) : ""; }

      function renderNotices(notices, lastReadAt) {
        const list = document.getElementById("noticeList");
        if (!notices.length) { list.innerHTML = '<div class="panel-empty">現在お知らせはありません。</div>'; return; }
        const lastReadTime = lastReadAt ? new Date(lastReadAt).getTime() : 0;
        list.innerHTML = notices.map(function (n) {
          const unread = new Date(n.created_at).getTime() > lastReadTime;
          return '<article class="notice-item' + (unread ? ' unread' : '') + '">'
            + (unread ? '<span class="unread-pip"></span>' : '')
            + '<span class="notice-icon"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c.5-.5 2-2 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg></span>'
            + '<span class="notice-body">'
              + '<span class="notice-top"><strong>' + esc(n.title) + '</strong><time>' + esc(formatDate(n.created_at)) + '</time></span>'
              + '<p class="notice-text">' + esc(n.body) + '</p>'
            + '</span>'
          + '</article>';
        }).join("");
      }

      async function load() {
        if (!supabaseClient) { renderNotices([], null); return; }
        const sessionResult = await supabaseClient.auth.getSession();
        const user = sessionResult.data.session?.user;
        if (!user) { window.location.href = "login.html?role=seeker"; return; }
        if (!(await window.MEDISPOT_ACCOUNT_GUARD.check(supabaseClient, user, "seeker"))) return;

        const profileResult = await supabaseClient.from("seeker_profiles").select("id,name,last_notices_read_at").eq("user_id", user.id).order("created_at", { ascending: false }).limit(1).maybeSingle();
        if (profileResult.error || !profileResult.data) { await supabaseClient.auth.signOut(); window.location.href = "login.html?role=seeker&roleError=1"; return; }
        const profile = profileResult.data;
        text("topbarName", profile.name || "求職者");
        text("topbarInitial", initial(profile.name));

        const noticesResult = await supabaseClient.from("notices").select("id,title,body,created_at").in("audience", ["all", "seeker"]).order("created_at", { ascending: false }).limit(50);
        const notices = noticesResult.error ? [] : (noticesResult.data || []);
        renderNotices(notices, profile.last_notices_read_at);

        if (notices.length) {
          await supabaseClient.from("seeker_profiles").update({ last_notices_read_at: new Date().toISOString() }).eq("id", profile.id);
        }
      }

      document.getElementById("logoutButton").addEventListener("click", async function () { if (supabaseClient) await supabaseClient.auth.signOut(); window.location.href = "login.html"; });
      document.querySelector(".bell-btn").addEventListener("click", function () { window.location.href = "seeker-messages.html"; });
      load().catch(function (error) { console.error(error); renderNotices([], null); });
    })();
  </script>
<script src="pwa-register.js"></script></body>
</html>
