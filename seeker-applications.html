<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>応募管理 | Medi Job</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#005bac"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="icon" href="assets/icon-32.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.flow-page { background: linear-gradient(180deg,#f4faff 0%,#fff 48%,#f2faf8 100%); color: var(--ink); }
    .site-header.seeker-topbar { position: sticky; top: 0; z-index: 70; }
    .seeker-topbar-right { display: flex; align-items: center; gap: 16px; }
    .bell-btn { position: relative; display: grid; place-items: center; width: 38px; height: 38px; color: var(--blue-dark); background: #f1f7fc; border: 1px solid var(--line); border-radius: 50%; cursor: pointer; }
    .bell-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .seeker-user { display: flex; align-items: center; gap: 9px; }
    .seeker-avatar { display: grid; place-items: center; width: 32px; height: 32px; color: #fff; background: var(--blue); border-radius: 50%; font-size: 12px; font-weight: 900; }
    .seeker-user strong { color: #14324c; font-size: 13px; font-weight: 900; }
    .logout-btn { min-height: 34px; padding: 0 14px; color: var(--blue); background: #fff; border: 1px solid var(--blue); border-radius: 8px; font-size: 12px; font-weight: 900; cursor: pointer; }

    .dash-body { display: grid; grid-template-columns: 230px minmax(0, 1fr); align-items: start; width: 100%; min-width: 0; }
    .dash-sidebar { position: sticky; top: 65px; height: calc(100vh - 65px); overflow-y: auto; padding: 18px 14px 24px; background: #fff; border-right: 1px solid var(--line); }
    .side-nav { display: grid; gap: 3px; margin: 0 0 16px; padding: 0; list-style: none; }
    .side-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: #3c5266; border-radius: 9px; font-size: 13px; font-weight: 800; }
    .side-nav a svg { width: 18px; height: 18px; flex: 0 0 auto; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .side-nav a:hover { background: #f1f7fc; color: var(--blue-dark); }
    .side-nav a.active { color: #fff; background: linear-gradient(120deg, var(--blue), var(--blue-2)); box-shadow: 0 8px 18px rgba(0,91,172,.24); }
    .support-card { padding: 15px; background: #f7fbff; border: 1px solid var(--line); border-radius: 12px; }
    .support-card strong { display: block; color: var(--blue-dark); font-size: 12.5px; font-weight: 900; }
    .support-card span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 700; }
    .support-card .support-phone { margin-top: 8px; color: var(--blue-dark); font-size: 17px; font-weight: 900; }
    .support-card a.support-cta { display: block; margin-top: 10px; text-align: center; min-height: 32px; line-height: 32px; color: var(--blue); background: #fff; border: 1px solid #acd3f1; border-radius: 7px; font-size: 11.5px; font-weight: 900; }

    .flow-shell { width: 100%; min-width: 0; padding: 26px clamp(16px,2.6vw,34px) 60px; }
    .page-head { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:20px; align-items:end; margin-bottom:24px; }
    .page-head h1 { margin:0; color:var(--blue-dark); font-size:clamp(28px,3.4vw,40px); line-height:1.2; font-weight:900; }
    .page-head p { margin:12px 0 0; color:var(--muted); font-size:15px; font-weight:800; line-height:1.8; }
    .pill { display:inline-flex; align-items:center; min-height:36px; padding:0 16px; color:var(--green-dark); background:#ecfff5; border:1px solid #a8e6c1; border-radius:999px; font-weight:900; white-space:nowrap; }
    .panel, .job-card, .detail-card, .side-card { background:rgba(255,255,255,.97); border:1px solid var(--line); border-radius:12px; box-shadow:0 18px 42px rgba(0,63,125,.08); }
    .panel, .detail-card, .side-card { padding:clamp(22px,3vw,32px); }
    .filter-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:14px; align-items:end; }
    label span { display:block; margin-bottom:7px; color:#102338; font-size:13px; font-weight:900; }
    select, input, textarea { width:100%; min-height:50px; padding:0 14px; color:#102338; background:#fff; border:1px solid #cfdfe9; border-radius:8px; font:inherit; font-size:14px; outline:none; }
    textarea { min-height:120px; padding-top:12px; line-height:1.7; resize:vertical; }
    select:focus,input:focus,textarea:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(0,91,172,.12); }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:50px; padding:0 20px; border-radius:8px; font-weight:900; border:0; cursor:pointer; text-decoration:none; }
    .btn-green { color:#fff; background:linear-gradient(180deg,#2ecb7f,var(--green)); box-shadow:0 14px 28px rgba(33,183,97,.24); }
    .btn-blue { color:#fff; background:linear-gradient(180deg,var(--blue-2),var(--blue)); box-shadow:0 14px 28px rgba(0,91,172,.22); }
    .btn-outline { color:var(--blue); background:#fff; border:1px solid #acd3f1; }
    .jobs-toolbar { display:flex; justify-content:space-between; gap:16px; align-items:center; margin:26px 0 14px; }
    .jobs-toolbar h2 { margin:0; color:var(--blue-dark); font-size:24px; font-weight:900; }
    .jobs-list { display:grid; gap:14px; }
    .job-card { display:grid; grid-template-columns:108px minmax(0,1fr) auto; gap:18px; align-items:center; padding:16px; }
    .job-thumb { width:108px; height:88px; overflow:hidden; border-radius:8px; background:#edf7ff; }
    .job-thumb img { width:100%; height:100%; object-fit:cover; }
    .job-tag { display:inline-flex; align-items:center; min-height:26px; padding:0 11px; color:var(--green-dark); background:#effff6; border:1px solid #8bdbad; border-radius:999px; font-size:12px; font-weight:900; }
    .match-tag { margin-left:8px; color:var(--blue); background:#f0f8ff; border-color:#b9dbf5; }
    .job-card h3 { margin:8px 0 6px; color:var(--blue-dark); font-size:19px; font-weight:900; }
    .job-meta { margin:0; color:var(--muted); font-size:13px; font-weight:800; line-height:1.7; }
    .job-salary { margin-top:6px; color:#008e51; font-size:17px; font-weight:900; }
    .detail-layout { display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:22px; align-items:start; }
    .detail-card h2,.side-card h2 { margin:0 0 14px; color:var(--blue-dark); font-size:22px; font-weight:900; }
    .detail-list { display:grid; grid-template-columns:150px 1fr; gap:12px; margin:0; }
    .detail-list dt { color:var(--muted); font-weight:900; }
    .detail-list dd { margin:0; color:#102338; font-weight:800; }
    .section { padding-top:24px; margin-top:24px; border-top:1px solid #e1edf6; }
    .app-list { display:grid; gap:14px; }
    .status { display:inline-flex; min-height:28px; align-items:center; padding:0 12px; border-radius:999px; color:var(--blue); background:#edf7ff; border:1px solid #b9dbf5; font-size:12px; font-weight:900; }
    .status.status-selection { color:#b5670f; background:#fff6e9; border-color:#f2cf9c; }
    .status.status-hired { color:var(--green-dark); background:#ecfff5; border-color:#b8ebcf; }
    .status.status-working { color:var(--blue); background:#edf7ff; border-color:#b9dbf5; }
    .status.status-completed { color:#5b6270; background:#eef1f5; border-color:#ccd3dd; }
    .job-card { display:block; padding:20px 22px; }
    .job-card-main h3 { margin:10px 0 4px; color:var(--blue-dark); font-size:19px; font-weight:900; }
    .job-facility { margin:0 0 14px; color:var(--muted); font-size:13.5px; font-weight:800; }
    .app-detail-list { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px 20px; margin:0 0 16px; padding:14px 16px; background:#f7fbff; border:1px solid #e1eef8; border-radius:10px; }
    .app-detail-list div { display:flex; gap:8px; }
    .app-detail-list dt { flex:0 0 auto; margin:0; color:var(--muted); font-size:12.5px; font-weight:900; }
    .app-detail-list dd { margin:0; color:#102338; font-size:12.5px; font-weight:800; }
    .job-card .job-actions { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    .chat-hint { color:var(--muted); font-size:12px; font-weight:700; }
    .message { display:none; margin-top:14px; font-weight:900; color:var(--green-dark); }
    @media (max-width: 960px) {
      .dash-body { grid-template-columns: 1fr; }
      .dash-sidebar { position: static; height: auto; display: flex; flex-wrap: nowrap; align-items: center; gap: 10px; overflow-x: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 12px; }
      .side-nav { display: flex; gap: 4px; margin: 0; flex: 0 0 auto; }
      .side-nav a { white-space: nowrap; }
      .support-card { display: none; }
    }
    @media(max-width:980px){.filter-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.detail-layout,.page-head{grid-template-columns:1fr}}
    @media(max-width:640px){.flow-shell{padding:20px 14px 48px}.filter-grid{grid-template-columns:1fr}.btn{width:100%}.app-detail-list{grid-template-columns:1fr}.detail-list{grid-template-columns:1fr}.jobs-toolbar{align-items:flex-start;flex-direction:column}}
  </style></head><body class="flow-page dashboard-page">
  <header class="site-header seeker-topbar">
    <a class="brand" href="index.html" aria-label="Medi Job home"><span class="brand-mark" aria-hidden="true"><span></span></span><span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span></a>
    <div class="seeker-topbar-right">
      <div class="seeker-user"><span class="seeker-avatar" id="topbarInitial">求</span><strong id="topbarName">読み込み中</strong></div>
      <button class="logout-btn" id="logoutButton" type="button">ログアウト</button>
    </div>
  </header>

  <div class="dash-body">
    <aside class="dash-sidebar" aria-label="求職者メニュー">
      <ul class="side-nav">
        <li><a href="seeker-dashboard.html"><svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg>ダッシュボード</a></li>
        <li><a href="seeker-jobs.html"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>求人を探す</a></li>
        <li><a class="active" href="seeker-applications.html"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>応募管理</a></li>
        <li><a href="seeker-messages.html"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/></svg>メッセージ</a></li>
        <li><a href="seeker-profile.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>プロフィール</a></li>
        <li><a href="seeker-resume.html"><svg viewBox="0 0 24 24"><path d="M6 2h9l3 3v17H6z"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>履歴書・職務経歴書</a></li>
        <li><a href="seeker-notices.html"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c.5-.5 2-2 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>お知らせ</a></li>
        <li><a href="seeker-settings.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>設定</a></li>
      </ul>

      <div class="support-card">
        <strong>サポート窓口</strong>
        <span>平日 9:00〜18:00</span>
        <span class="support-phone">03-1234-5678</span>
        <a class="support-cta" href="#">お問い合わせ</a>
      </div>
    </aside>

    <main class="flow-shell">
      <div class="page-head"><div><h1>応募管理</h1><p>応募済みの求人、選考状況、チャット確認を管理します。</p></div><a class="btn btn-green" href="seeker-jobs.html">求人を探す</a></div>
      <section class="panel"><div class="app-list" id="applicationsList"></div></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="account-guard.js"></script><script src="application-status.js"></script><script src="job-flow.js"></script><script src="pwa-register.js"></script></body></html>
