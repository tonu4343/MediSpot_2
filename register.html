<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規会員登録 | MediSpot</title>
  <style>
    :root { --blue:#005bac; --blue-dark:#003f7d; --green:#21b761; --green-dark:#10964d; --ink:#08335f; --muted:#64798a; --line:#d8e8f4; --shadow:0 12px 30px rgba(0,63,125,.1); --radius:8px; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:linear-gradient(180deg,#f3f9ff 0%,#fff 42%,#f7fbff 100%); font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif; line-height:1.65; overflow-x:hidden; }
    a { color:inherit; text-decoration:none; }
    .site-header { position:sticky; top:0; z-index:20; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); box-shadow:0 2px 16px rgba(0,63,125,.08); backdrop-filter:blur(12px); }
    .header-inner { display:flex; align-items:center; justify-content:space-between; gap:22px; width:min(1180px,calc(100% - 48px)); min-height:64px; margin:0 auto; }
    .brand { display:inline-flex; align-items:center; gap:10px; flex:0 0 auto; color:var(--blue); font-weight:900; }
    .brand-mark { position:relative; width:38px; height:38px; border-radius:8px; }
    .brand-mark::before,.brand-mark::after,.brand-mark span::before,.brand-mark span::after { content:""; position:absolute; background:#fff; border:4px solid var(--blue); }
    .brand-mark::before { left:13px; top:1px; width:12px; height:36px; border-radius:4px; }
    .brand-mark::after { left:1px; top:13px; width:36px; height:12px; border-radius:4px; }
    .brand-mark span::before { left:15px; top:3px; z-index:2; width:8px; height:32px; border:0; background:#fff; }
    .brand-mark span::after { left:3px; top:15px; z-index:3; width:32px; height:8px; border:0; background:var(--green); }
    .brand strong { display:block; font-size:24px; line-height:1; letter-spacing:0; }
    .brand small { display:block; margin-top:3px; color:var(--blue-dark); font-size:10px; line-height:1; }
    .site-nav { display:flex; align-items:center; justify-content:flex-end; gap:clamp(14px,2vw,30px); color:var(--blue-dark); font-size:14px; font-weight:800; white-space:nowrap; }
    .site-nav a { display:inline-flex; align-items:center; min-height:38px; padding:0 4px; border-radius:var(--radius); }
    .site-nav a.active { padding:0 18px; color:var(--blue); background:#edf6ff; font-weight:900; }
    .page { width:min(900px,calc(100% - 40px)); margin:0 auto; padding:46px 0 64px; }
    .page-title { margin:0; color:var(--blue-dark); font-size:clamp(28px,4vw,36px); line-height:1.25; font-weight:900; letter-spacing:0; }
    .page-title::after { content:""; display:block; width:68px; height:4px; margin-top:10px; background:var(--blue); border-radius:999px; }
    .page-lead { margin:14px 0 28px; color:var(--muted); font-size:16px; font-weight:700; }
    .role-select { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:22px; }
    .role-card { display:grid; place-items:center; min-height:190px; padding:26px 24px; text-align:center; background:#fff; border:2px solid var(--line); border-radius:12px; box-shadow:0 8px 18px rgba(0,63,125,.06); transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .role-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
    .role-card.seeker:hover { border-color:var(--blue); background:#edf6ff; }
    .role-card.employer:hover { border-color:var(--green-dark); background:#effbf5; }
    .role-card .icon { margin-bottom:10px; font-size:36px; line-height:1; }
    .role-card h2 { margin:0 0 6px; color:#061a30; font-size:23px; line-height:1.35; font-weight:900; }
    .role-card p { max-width:330px; margin:0 0 18px; color:var(--muted); font-size:14px; font-weight:800; line-height:1.55; }
    .role-card .cta { display:inline-flex; align-items:center; justify-content:center; min-height:42px; padding:0 20px; color:#fff; background:linear-gradient(180deg,#0b6fc8,var(--blue)); border-radius:8px; font-size:14px; font-weight:900; }
    .role-card.employer .cta { background:linear-gradient(180deg,#28c975,var(--green)); }
    .note { margin-top:24px; padding:16px 18px; color:var(--muted); background:#fff; border:1px solid var(--line); border-radius:10px; font-size:13px; font-weight:700; }
    @media (max-width:760px) { .header-inner { flex-wrap:wrap; width:calc(100% - 32px); padding:12px 0; } .site-nav { width:100%; justify-content:flex-start; gap:16px; overflow-x:auto; padding-bottom:2px; font-size:13px; } .page { width:calc(100% - 32px); padding-top:32px; } .role-select { grid-template-columns:1fr; gap:14px; } }
    @media (max-width:430px) { .brand strong { font-size:21px; } .brand small { font-size:9px; } .brand-mark { transform:scale(.9); transform-origin:left center; } .page-title { font-size:27px; } .page-lead { font-size:14px; } .role-card h2 { font-size:20px; } }
  </style>
</head>
<body>
  <header class="site-header"><div class="header-inner"><a class="brand" href="index.html" aria-label="MediSpot ホーム"><span class="brand-mark" aria-hidden="true"><span></span></span><span><strong>MediSpot</strong><small>メディスポット</small></span></a><nav class="site-nav" aria-label="メインナビゲーション"><a href="index.html">サービス紹介</a><a class="active" href="register.html">新規会員登録</a><a href="login.html">ログイン</a></nav></div></header>
  <main class="page">
    <h1 class="page-title">新規会員登録</h1>
    <p class="page-lead">登録種別を選択してください。次の画面で必要事項を入力します。</p>
    <section class="role-select" aria-label="登録種別">
      <a class="role-card seeker" href="register-seeker.html"><span class="icon" aria-hidden="true">👩‍⚕️</span><span><h2>求職者として登録</h2><p>看護師・検査技師・リハビリ職など、医療資格者の方向け</p><span class="cta">求職者登録へ</span></span></a>
      <a class="role-card employer" href="register-employer.html"><span class="icon" aria-hidden="true">🏥</span><span><h2>求人者として登録</h2><p>病院・クリニック・薬局など、医療機関の方向け</p><span class="cta">求人者登録へ</span></span></a>
    </section>
    <p class="note">すでに登録済みの方は <a href="login.html" style="color:var(--blue);font-weight:900;">ログイン</a> してください。</p>
  </main>
</body>
</html>
