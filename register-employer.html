<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求人者登録 | Medi Job</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { --employer-teal: #16a394; --employer-green: #21b761; --soft-bg: #f3fafb; }
    body.employer-register-page { background: linear-gradient(180deg, #f6fbff 0%, #ffffff 48%, #f4fafb 100%); color: var(--blue-dark); }
    .register-shell { padding: 42px 20px 72px; }
    .register-layout { width: min(680px, 100%); margin: 0 auto; }
    .register-card-main, .side-card { background: rgba(255,255,255,.96); border: 1px solid #d6e8f4; border-radius: 10px; box-shadow: 0 22px 54px rgba(0,63,125,.10); }
    .register-card-main { padding: clamp(28px, 4vw, 42px); }
    .register-title-row { margin-bottom: 26px; text-align: center; }
    .register-title-row h1 { margin: 0 0 10px; color: #0f172a; font-size: clamp(28px, 5vw, 38px); line-height: 1.25; font-weight: 900; letter-spacing: 0; }
    .register-title-row p { margin: 0 auto; max-width: 540px; color: #526172; font-size: 14px; font-weight: 800; line-height: 1.8; }
    .role-pill { display: inline-flex; align-items: center; min-height: 48px; padding: 0 20px; color: #007a6c; background: #dcf7f0; border-radius: 999px; font-size: 16px; font-weight: 900; white-space: nowrap; }
    .form-section-title { margin: 34px 0 18px; padding-bottom: 16px; border-bottom: 1px solid #dce8f0; color: #0f172a; font-size: 25px; font-weight: 900; }
    .form-section-title:first-of-type { margin-top: 0; }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    .field.full { grid-column: 1 / -1; }
    .field label { display: block; margin-bottom: 8px; color: #102338; font-size: 16px; font-weight: 900; }
    .required { color: #d92735; margin-left: 4px; }
    .input, .textarea { width: 100%; min-height: 56px; padding: 0 16px; color: #102338; background: #fff; border: 1px solid #cfdfe9; border-radius: 8px; font: inherit; font-size: 16px; outline: none; transition: border-color .15s ease, box-shadow .15s ease; }
    .textarea { min-height: 156px; padding-top: 14px; resize: vertical; line-height: 1.7; }
    .input:focus, .textarea:focus { border-color: var(--employer-teal); box-shadow: 0 0 0 4px rgba(22,163,148,.13); }
    .check-grid { display: flex; flex-wrap: wrap; gap: 10px; min-height: 38px; align-items: center; }
    .check-pill { position: relative; cursor: pointer; }
    .check-pill input { position: absolute; opacity: 0; }
    .check-pill span { display: inline-flex; align-items: center; min-height: 38px; padding: 0 15px; color: var(--blue); background: #f4fbff; border: 1px solid #acd3f1; border-radius: 999px; font-size: 14px; font-weight: 900; }
    .check-pill input:checked + span { color: #007a52; border-color: #7ed5a0; background: #effdf6; }
    .terms-row { display: flex; gap: 12px; align-items: flex-start; margin-top: 28px; color: #243b53; font-size: 15px; font-weight: 900; line-height: 1.6; }
    .terms-row input { width: 20px; height: 20px; margin-top: 2px; accent-color: var(--employer-teal); }
    .terms-row a { color: var(--blue); text-decoration: underline; text-underline-offset: 3px; }
    .password-field { position: relative; }
    .password-field .input { padding-right: 94px; }
    .password-toggle { position: absolute; right: 8px; bottom: 8px; min-height: 40px; padding: 0 12px; color: var(--blue); background: #f4faff; border: 1px solid #b9d8ec; border-radius: 7px; font-size: 13px; font-weight: 900; cursor: pointer; }
    .password-toggle:hover { background: #eaf6ff; }
    .submit-row { margin-top: 28px; display: grid; gap: 15px; text-align: center; }
    .submit-row .wide-cta { width: 100%; min-height: 56px; margin: 0; border: 0; border-radius: 8px; background: linear-gradient(180deg, #28c975, var(--green)); box-shadow: 0 15px 28px rgba(33,183,97,.24); font-size: 17px; cursor: pointer; }
    .login-link { color: var(--blue); font-size: 14px; font-weight: 800; }
    .back-button { min-height: 58px; padding: 0 28px; color: #007a6c; background: #fff; border: 1px solid #a9ddd8; border-radius: 8px; font-size: 18px; font-weight: 900; }
    .form-message { display: none; color: #007a52; font-weight: 900; }
    .side-stack { display: grid; gap: 18px; position: sticky; top: 96px; }
    .side-card { padding: 28px; }
    .side-card h2 { margin: 0 0 20px; color: #0f172a; font-size: 26px; font-weight: 900; }
    .side-card p { margin: 0; color: #526172; font-size: 17px; font-weight: 800; line-height: 1.7; }
    .steps-list { display: grid; gap: 16px; margin: 0; padding: 0; list-style: none; }
    .steps-list li { display: grid; grid-template-columns: 48px 1fr; gap: 14px; align-items: center; color: #0f172a; font-size: 18px; font-weight: 900; }
    .steps-list b { display: grid; place-items: center; width: 46px; height: 46px; color: #007a6c; background: #dcf7f0; border-radius: 10px; }
    .mock-actions { display: grid; gap: 12px; margin-top: 22px; }
    .mock-actions a { display: flex; align-items: center; justify-content: center; min-height: 54px; border-radius: 8px; border: 1px solid #a9ddd8; color: #007a6c; font-size: 17px; font-weight: 900; }
    .mock-actions a:first-child { color: #fff; border-color: transparent; background: #16a394; box-shadow: 0 12px 22px rgba(22,163,148,.18); }
    .free-card strong { display: block; margin-bottom: 12px; color: #0f172a; font-size: 25px; font-weight: 900; }
    .free-card span { color: #526172; font-size: 17px; font-weight: 800; line-height: 1.7; }
    @media (max-width: 980px) { .register-layout { grid-template-columns: 1fr; } .side-stack { position: static; } }
    @media (max-width: 720px) { .register-shell { padding: 34px 16px 50px; } .register-card-main, .side-card { padding: 22px; } .register-title-row { display: block; } .role-pill { margin-top: 18px; } .form-grid { grid-template-columns: 1fr; } .submit-row .wide-cta, .back-button { width: 100%; } }
  </style>
</head>
<body class="employer-register-page" id="top">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Medi Job home">
      <span class="brand-mark" aria-hidden="true"><span></span></span>
      <span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span>
    </a>
    <nav class="nav-links" aria-label="registration navigation">
      <a href="register-seeker.html">求職者はこちら</a>
    </nav>
    <div class="header-actions">
      <a class="btn btn-outline" href="login.html?role=employer">ログイン</a>
      <a class="btn btn-green" href="index.html">トップへ</a>
    </div>
  </header>

  <main class="register-shell">
    <div class="register-layout">
      <section class="register-card-main" aria-labelledby="registerTitle">
        <div class="register-title-row">
          <div>
            <h1 id="registerTitle">求人者アカウント登録</h1>
            <p>まずは基本情報だけをご登録ください。募集職種や勤務条件などの詳しい内容は、登録後の求人作成画面で入力できます。</p>
          </div>
        </div>

        <form id="employerForm" novalidate>
          <div class="form-grid">
            <div class="field full"><label for="name">お名前（ご担当者名） <span class="required">必須</span></label><input class="input" id="name" autocomplete="name" required placeholder="例）佐藤 花子"></div>
            <div class="field full"><label for="facilityName">医療機関名 <span class="required">必須</span></label><input class="input" id="facilityName" required placeholder="例）ブランチ総合クリニック"></div>
            <div class="field full"><label for="facilityType">施設区分</label><select class="input" id="facilityType"><option>病院</option><option>クリニック</option><option>薬局</option><option>介護施設</option><option>健診センター</option><option>訪問看護ステーション</option><option>その他</option></select></div>
            <div class="field full"><label for="address">所在地 <span class="required">必須</span></label><input class="input" id="address" autocomplete="street-address" required placeholder="例）東京都世田谷区〇〇1-2-3"></div>
            <div class="field full"><label for="email">メールアドレス <span class="required">必須</span></label><input class="input" id="email" type="email" autocomplete="email" required placeholder="example@example.com" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="ドメインを含む正しいメールアドレスの形式で入力してください（例：name@example.com）"></div>
            <div class="field full password-field"><label for="password">パスワード <span class="required">必須</span></label><input class="input" id="password" type="password" autocomplete="new-password" minlength="8" required placeholder="8文字以上"><button class="password-toggle" id="passwordToggle" type="button" aria-controls="password" aria-pressed="false">表示する</button></div>
            <div class="field full password-field"><label for="passwordConfirm">パスワード確認 <span class="required">必須</span></label><input class="input" id="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required placeholder="もう一度入力"><button class="password-toggle" id="passwordConfirmToggle" type="button" aria-controls="passwordConfirm" aria-pressed="false">表示する</button></div>
          </div>

          <label class="terms-row"><input type="checkbox" required><span><a href="terms.html" target="_blank" rel="noopener">利用規約</a>と<a href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>に同意します。</span></label>
          <div class="submit-row"><button class="wide-cta" type="submit">この内容で登録する</button><a class="login-link" href="login.html?role=employer">すでにアカウントをお持ちの方はログイン</a><span class="form-message" id="formMessage">登録後、求人者ダッシュボードへ移動します。</span></div>
        </form>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-forms.js"></script>
  <script>
    (function () {
      [["passwordToggle", "password"], ["passwordConfirmToggle", "passwordConfirm"]].forEach(function (pair) {
        const button = document.getElementById(pair[0]);
        const input = document.getElementById(pair[1]);
        if (!button || !input) return;
        button.addEventListener("click", function () {
          const showing = input.type === "text";
          input.type = showing ? "password" : "text";
          button.textContent = showing ? "表示する" : "隠す";
          button.setAttribute("aria-pressed", String(!showing));
        });
      });
    })();
  </script>
</body>
</html>
