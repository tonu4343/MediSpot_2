<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求人者の方へ | MediSpot</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .employer-page { background: #fff; }
    .employer-hero {
      position: relative;
      min-height: 550px;
      overflow: hidden;
      background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,.95) 40%, rgba(242,255,247,.45) 74%, rgba(242,255,247,.1) 100%);
    }
    .employer-hero-photo { position: absolute; inset: 0; z-index: 0; }
    .employer-hero-photo img { width: 100%; height: 100%; object-fit: contain; object-position: right center; }
    .employer-hero-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,.96) 36%, rgba(255,255,255,.62) 62%, rgba(255,255,255,.14) 100%);
    }
    .employer-hero-inner {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 68px 0 42px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 14px;
      color: var(--green-dark);
      background: #f2fff7;
      border: 1px solid #9adfb8;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .employer-hero h1 {
      margin: 0 0 18px;
      color: var(--blue);
      font-size: clamp(38px, 5vw, 58px);
      line-height: 1.32;
      font-weight: 900;
      letter-spacing: 0;
    }
    .employer-hero p {
      width: min(600px, 100%);
      margin: 0 0 26px;
      color: #223f59;
      font-size: 17px;
      font-weight: 800;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
    .btn-blue { color: var(--blue); background: #fff; border-color: var(--blue); box-shadow: 0 8px 16px rgba(0,91,172,.08); }
    .employer-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      width: min(780px, 100%);
    }
    .employer-summary article {
      min-height: 104px;
      padding: 18px;
      background: rgba(255,255,255,.94);
      border: 1px solid #d7e8f5;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .employer-summary strong { display: block; color: var(--blue); font-size: 18px; margin-bottom: 4px; }
    .employer-summary span { color: var(--muted); font-size: 13px; font-weight: 800; }
    .section-soft { background: linear-gradient(180deg, #f5fbff 0%, #fff 100%); }
    .intro-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(0, .98fr);
      gap: 34px;
      align-items: center;
      width: min(1180px, 100%);
      margin: 0 auto;
    }
    .intro-card, .metric-card, .register-card, .pricing-card, .voice-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .intro-card { padding: 30px; }
    .intro-card h2, .form-intro h2 {
      margin: 0 0 14px;
      color: var(--blue-dark);
      font-size: clamp(27px, 3vw, 38px);
      line-height: 1.35;
      font-weight: 900;
    }
    .intro-card p, .form-intro p { margin: 0; color: var(--muted); font-weight: 800; }
    .process-list { display: grid; gap: 12px; margin: 24px 0 0; padding: 0; list-style: none; }
    .process-list li {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px;
      background: #f8fcff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .process-list b {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: var(--green-dark);
      background: #f2fff7;
      border: 1px solid #9adfb8;
      border-radius: 50%;
      font-size: 14px;
    }
    .process-list strong { display: block; color: var(--blue); font-size: 16px; }
    .process-list span { color: var(--muted); font-size: 13px; font-weight: 800; }
    .photo-panel { position: relative; min-height: 430px; overflow: hidden; border-radius: 12px; border: 1px solid var(--line); box-shadow: var(--shadow); }
    .photo-panel img { width: 100%; height: 100%; min-height: 430px; object-fit: cover; object-position: center; }
    .price-circle {
      position: absolute;
      right: 24px;
      bottom: 24px;
      display: grid;
      place-items: center;
      width: 150px;
      height: 150px;
      color: #fff;
      text-align: center;
      background: linear-gradient(180deg, #28c975, var(--green));
      border-radius: 50%;
      box-shadow: 0 16px 30px rgba(33,183,97,.26);
      font-weight: 900;
      line-height: 1.35;
    }
    .price-circle strong { display: block; font-size: 28px; }
    .price-circle small { display: block; font-size: 12px; }
    .metric-grid, .job-type-grid, .voice-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      width: min(1180px, 100%);
      margin: 0 auto;
    }
    .metric-card, .job-type-card, .voice-card { padding: 24px; }
    .metric-icon {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      color: var(--blue);
      border: 2px solid var(--blue);
      border-radius: 50%;
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 14px;
    }
    .metric-card h3, .job-type-card h3 { margin: 0 0 8px; color: var(--blue-dark); font-size: 20px; }
    .metric-card p, .job-type-card p, .voice-card p { margin: 0; color: var(--muted); font-weight: 800; }
    .job-type-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .job-type-card span {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      padding: 0 12px;
