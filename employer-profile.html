<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>施設プロフィール編集 | Medi Job</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#005bac"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="icon" href="assets/icon-32.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.profile-page { background: linear-gradient(180deg, #f4faff 0%, #ffffff 46%, #f2faf8 100%); color: var(--ink); }
    .profile-shell { width: min(1160px, calc(100% - 40px)); margin: 0 auto; padding: 42px 0 70px; }
    .page-heading { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 22px; align-items: end; margin-bottom: 24px; }
    .page-heading h1 { margin: 0; color: var(--blue-dark); font-size: clamp(34px, 4vw, 52px); line-height: 1.2; font-weight: 900; }
    .page-heading p { margin: 12px 0 0; color: var(--muted); font-size: 16px; font-weight: 800; }
    .status-pill { display: inline-flex; align-items: center; min-height: 36px; padding: 0 16px; color: var(--green-dark); background: #ecfff5; border: 1px solid #a8e6c1; border-radius: 999px; font-weight: 900; white-space: nowrap; }
    .profile-layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 22px; align-items: start; }
    .profile-form-card, .side-card { background: rgba(255,255,255,.97); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 18px 42px rgba(0,63,125,.08); }
    .profile-form-card { padding: clamp(24px, 4vw, 38px); }
    .form-section { padding-top: 26px; margin-top: 26px; border-top: 1px solid #e1edf6; }
    .form-section:first-child { padding-top: 0; margin-top: 0; border-top: 0; }
    .form-section h2 { margin: 0 0 18px; color: var(--blue-dark); font-size: 23px; font-weight: 900; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px 22px; }
    .field.full { grid-column: 1 / -1; }
    .field label, .check-label { display: block; margin-bottom: 8px; color: #102338; font-size: 15px; font-weight: 900; }
    .required { color: #d92735; margin-left: 4px; }
    .input, .textarea { width: 100%; min-height: 54px; padding: 0 16px; color: #102338; background: #fff; border: 1px solid #cfdfe9; border-radius: 8px; font: inherit; font-size: 15px; outline: none; }
    .input[readonly] { color: var(--muted); background: #f5f8fa; }
    .textarea { min-height: 142px; padding-top: 14px; resize: vertical; line-height: 1.7; }
    .input:focus, .textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(0,91,172,.12); }
    .hint { display: block; margin-top: 8px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .check-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .check-pill { position: relative; display: inline-flex; cursor: pointer; }
    .check-pill input { position: absolute; opacity: 0; }
    .check-pill span { display: inline-flex; align-items: center; min-height: 38px; padding: 0 15px; color: var(--blue-dark); background: #fff; border: 1px solid #cbdce8; border-radius: 999px; font-size: 14px; font-weight: 900; }
    .check-pill input:checked + span { color: var(--green-dark); border-color: #7ed5a0; background: #effdf6; box-shadow: 0 8px 20px rgba(33,183,97,.12); }
    .form-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-top: 30px; }
    .save-btn { min-height: 58px; min-width: 260px; border: 0; border-radius: 8px; color: #fff; background: linear-gradient(180deg, var(--blue-2), var(--blue)); box-shadow: 0 16px 30px rgba(0,91,172,.24); font-size: 18px; font-weight: 900; cursor: pointer; }
    .back-btn { min-height: 58px; padding: 0 24px; display: inline-flex; align-items: center; color: var(--blue); background: #fff; border: 1px solid #acd3f1; border-radius: 8px; font-weight: 900; }
    .form-message { display: none; font-weight: 900; color: var(--green-dark); }
    .side-stack { display: grid; gap: 18px; position: sticky; top: 92px; }
    .side-card { padding: 24px; }
    .side-card h2 { margin: 0 0 14px; color: var(--blue-dark); font-size: 21px; font-weight: 900; }
    .side-list { display: grid; gap: 12px; margin: 0; padding: 0; list-style: none; }
    .side-list li { display: grid; grid-template-columns: 34px 1fr; gap: 10px; align-items: start; color: #243b53; font-size: 14px; font-weight: 800; }
    .side-list b { display: grid; place-items: center; width: 34px; height: 34px; color: var(--blue); background: #edf7ff; border: 1px solid #b9dbf5; border-radius: 50%; }

    .dashboard-nav { display: flex; justify-content: center; gap: clamp(12px, 2vw, 28px); flex: 1; color: var(--blue-dark); font-size: 13px; font-weight: 900; white-space: nowrap; }
    .dashboard-nav a { padding: 8px 0; border-bottom: 2px solid transparent; }
    .dashboard-nav a.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .logout-btn { min-height: 38px; padding: 0 18px; color: var(--blue); background: #fff; border: 1px solid var(--blue); border-radius: 8px; font-size: 13px; font-weight: 900; cursor: pointer; }
    @media (max-width: 920px) { .profile-layout, .page-heading { grid-template-columns: 1fr; } .side-stack { position: static; } .site-header { flex-wrap: wrap; } .dashboard-nav { order: 3; width: 100%; overflow-x: auto; justify-content: flex-start; } }
    @media (max-width: 640px) { .profile-shell { width: calc(100% - 28px); padding-top: 28px; } .form-grid { grid-template-columns: 1fr; } .save-btn, .back-btn { width: 100%; justify-content: center; } }
  </style>
</head>
<body class="profile-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Medi Job home"><span class="brand-mark" aria-hidden="true"><span></span></span><span class="brand-text"><strong>Medical Spot Job</strong><small aria-hidden="true"></small></span></a>
    <nav class="dashboard-nav" aria-label="求人者メニュー"><a href="employer-dashboard.html">ダッシュボード</a><a href="employer-job-new.html">求人作成</a><a href="employer-jobs.html">求人管理</a><a href="employer-applications.html">応募者・メッセージ</a><a class="active" href="employer-profile.html">施設情報</a></nav>
    <div class="header-actions"><button class="logout-btn" id="logoutButton" type="button">ログアウト</button></div>
  </header>

  <main class="profile-shell">
    <div class="page-heading">
      <div><h1>施設プロフィール編集</h1><p>入力した内容は求人票や応募者へのご案内に使用されます。</p></div>
      <span class="status-pill" id="saveStatus">未完了</span>
    </div>

    <div class="profile-layout">
      <form class="profile-form-card" id="employerProfileForm">
        <section class="form-section">
          <h2>基本情報</h2>
          <div class="form-grid">
            <div class="field full"><label for="facilityName">医療機関名<span class="required">必須</span></label><input class="input" id="facilityName" required placeholder="例）ブランチ総合クリニック"></div>
            <div class="field"><label for="facilityType">施設区分</label><select class="input" id="facilityType"><option value="">選択してください</option><option>病院</option><option>クリニック</option><option>薬局</option><option>介護施設</option><option>健診センター</option><option>訪問看護ステーション</option><option>その他</option></select></div>
            <div class="field" hidden><label for="staffNeed">募集職種</label><input class="input" id="staffNeed" placeholder="例）看護師、臨床検査技師"></div>
            <div class="field full"><label for="address">所在地<span class="required">必須</span></label><input class="input" id="address" required placeholder="例）東京都世田谷区〇〇1-2-3"></div>
          </div>
        </section>

        <section class="form-section">
          <h2>担当者情報</h2>
          <div class="form-grid">
            <div class="field"><label for="contactName">ご担当者名<span class="required">必須</span></label><input class="input" id="contactName" required placeholder="例）佐藤 花子"></div>
            <div class="field"><label for="position">役職</label><input class="input" id="position" placeholder="例）採用担当"></div>
            <div class="field"><label for="phone">電話番号</label><input class="input" id="phone" inputmode="tel" autocomplete="tel" placeholder="03-0000-0000"></div>
            <div class="field"><label for="email">メールアドレス</label><input class="input" id="email" type="email" readonly><span class="hint">メールアドレスの変更はログイン情報の変更が必要です。</span></div>
          </div>
        </section>

        <section class="form-section" hidden>
          <h2>募集条件</h2>
          <label class="check-label">募集したい雇用形態（複数選択可）</label>
          <div class="check-grid" id="recruitStylesGrid"><label class="check-pill"><input type="checkbox" value="スポット"><span>スポット</span></label><label class="check-pill"><input type="checkbox" value="非常勤"><span>非常勤</span></label><label class="check-pill"><input type="checkbox" value="パート"><span>パート</span></label><label class="check-pill"><input type="checkbox" value="業務委託"><span>業務委託</span></label><label class="check-pill"><input type="checkbox" value="常勤"><span>常勤</span></label></div>
          <div class="form-grid" style="margin-top:22px;">
            <div class="field full"><label for="note">施設からのメッセージ</label><textarea class="textarea" id="note" placeholder="施設の特徴や求職者へのメッセージを自由にご記入ください。"></textarea></div>
          </div>
        </section>

        <div class="form-actions"><button class="save-btn" type="submit">施設情報を保存する</button><a class="back-btn" href="employer-dashboard.html">ダッシュボードに戻る</a><span class="form-message" id="formMessage"></span></div>
      </form>

      <aside class="side-stack">
        <section class="side-card"><h2>プロフィールの使われ方</h2><ul class="side-list"><li><b>1</b><span>施設名・所在地は求人票に表示されます</span></li><li><b>2</b><span>担当者名・電話番号は選考中のやり取りで使用します</span></li><li><b>3</b><span>施設からのメッセージは求職者への信頼材料になります</span></li></ul></section>
        <section class="side-card"><h2>表示場所</h2><p style="margin:0;color:var(--muted);font-weight:800;line-height:1.8;">求人者ダッシュボードの「施設情報を編集」からこの画面を開きます。</p></section>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script><script src="account-guard.js"></script>
  <script>
    (function () {
      const config = window.MEDISPOT_SUPABASE || {};
      const configured = config.url && config.anonKey && !config.url.includes('YOUR_PROJECT_ID') && !config.anonKey.includes('YOUR_SUPABASE_ANON_KEY');
      const supabaseClient = configured && window.supabase ? window.supabase.createClient(config.url, config.anonKey) : null;
      let currentUser = null;
      let currentProfile = null;
      function el(id) { return document.getElementById(id); }
      function value(id) { return el(id)?.value?.trim() || null; }
      function setValue(id, value) { const node = el(id); if (node && value) node.value = value; }
      function message(text, error) { const node = el('formMessage'); node.textContent = text; node.style.display = 'inline'; node.style.color = error ? '#b42318' : 'var(--green-dark)'; }
      function selectedRecruitStyles() { return Array.from(el('recruitStylesGrid').querySelectorAll('input:checked')).map(input => input.value); }
      function setRecruitStyles(saved) {
        const set = new Set(Array.isArray(saved) ? saved : (saved ? [saved] : []));
        el('recruitStylesGrid').querySelectorAll('input').forEach(input => { input.checked = set.has(input.value); });
      }
      function fill(profile, user) {
        currentProfile = profile || {};
        setValue('facilityName', currentProfile.facility_name);
        setValue('facilityType', currentProfile.facility_type);
        setValue('staffNeed', currentProfile.staff_need);
        setValue('address', currentProfile.address);
        setValue('contactName', currentProfile.contact_name);
        setValue('position', currentProfile.position);
        setValue('phone', currentProfile.phone);
        el('email').value = currentProfile.email || user?.email || '';
        setRecruitStyles(currentProfile.recruit_styles);
        setValue('note', currentProfile.note);
        el('saveStatus').textContent = currentProfile.facility_name ? '登録済み' : '未完了';
      }
      async function load() {
        if (!supabaseClient) { message('Supabase URL と anon key を設定してください。', true); return; }
        const session = await supabaseClient.auth.getSession();
        currentUser = session.data.session?.user;
        if (!currentUser) { window.location.href = 'login.html?role=employer'; return; }
        if (!(await window.MEDISPOT_ACCOUNT_GUARD.check(supabaseClient, currentUser, 'employer'))) return;
        const result = await supabaseClient.from('employer_profiles').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(1).maybeSingle();
        if (result.error || !result.data) { window.location.href = 'login.html?role=employer&roleError=1'; return; }
        fill(result.data, currentUser);
      }
      el('logoutButton').addEventListener('click', async function () { if (supabaseClient) await supabaseClient.auth.signOut(); window.location.href = 'login.html'; });
      el('employerProfileForm').addEventListener('submit', async function (event) {
        event.preventDefault();
        if (!supabaseClient || !currentUser || !currentProfile?.id) return;
        const payload = { facility_name: value('facilityName'), facility_type: value('facilityType'), staff_need: value('staffNeed'), address: value('address'), contact_name: value('contactName'), position: value('position'), phone: value('phone'), recruit_styles: selectedRecruitStyles(), note: value('note') };
        const result = await supabaseClient.from('employer_profiles').update(payload).eq('id', currentProfile.id).eq('user_id', currentUser.id);
        if (result.error) { console.error(result.error); message('保存に失敗しました。' + (result.error.message ? ' ' + result.error.message : ''), true); return; }
        message('施設情報を保存しました。前の画面に戻ります。', false);
        el('saveStatus').textContent = '登録済み';
        const back = document.referrer && new URL(document.referrer).origin === window.location.origin ? document.referrer : 'employer-dashboard.html';
        setTimeout(function () { window.location.href = back; }, 900);
      });
      load().catch(function (error) { console.error(error); message('施設情報を読み込めませんでした。', true); });
    })();
  </script>
<script src="pwa-register.js"></script></body>
</html>
